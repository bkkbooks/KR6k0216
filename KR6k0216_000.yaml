body:
  text: 芝苑遺編目録上卷戒體章持犯體章持犯句法章律宗要大小乘論始終戒要中卷授大乘菩薩戒儀剃髮儀式受戒方便建明州開元寺戒壇誓文并鄭丞相跋誡沙彌文下卷為蔣樞密開講要義請簡詩附為高麗僧統義天開講要義上樝菴法師書南山律宗祖承圖録南山律師撰長録并跋目録終
