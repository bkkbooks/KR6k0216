body:
  text: 六世法孫道詢集為判府蔣樞密開講要義請簡謝詩附之奇頓首即日想惟戒體安隱為大導師幸甚幸甚之奇旬休欲携蒙詣講席願聞略講戒律大意并佛法名以滌家悋敢輙先稟聞幸希道炤之奇頓首判府樞密三月初十日與令嗣提宮寺丞壻發勾陳奉議同羣夫人俱預法筵焚香拜請講曰如來為一大事因緣故出現於世唯以佛之知見示悟眾生欲令眾生入佛智慧是以種種方便為一切眾生作成佛之由也經云凡有心者皆當作佛所以常不輕菩薩每將十三字教化於人但言我不敢輕於汝等汝等皆當作佛於是八十年在世五十餘年說法其意無他只欲教化眾生作佛耳如來於十二年中但說略教一偈云善護於口言自淨其志意身莫作諸惡此三業道淨能得如是行是大仙人道善護口言即口業也淨志意即心業也莫作諸惡即身業也三業道淨即是佛行也大仙金仙皆召於佛世間神仙皆小仙也即此謂之教授木叉但由眾生無始結惑三障所纏過境而動而妙清淨體墮生死海中故華嚴座上現千尺盧舍那身坐蓮華臺周匝千華一一葉中釋迦化佛皆來聽誦佛戒初結波羅提木叉即梵網經菩薩戒也梵語盧舍那此云淨滿即報身佛也是中十重戒謂波羅夷四十八條謂輕垢罪大抵止人為惡有人懼以戒禁多不敢受經云若國王王子大臣百官比丘比丘尼庶人乃至四趣眾生但解法師語者皆可得受故云寧受後破不可不受何以如此以受心境徧功德深也破戒則別別所犯也涅槃經云欲見佛性證大涅槃必須深心修持淨戒又華嚴經云戒為無上菩提本應當具足持淨戒若能堅持於淨戒是則如來所讚歎諸經論中廣有讚戒功德此即約大乘戒如是說也其有機緣不等故華嚴會上法所不被者如來即現應身乃降生示跡誕質王宮厭世無常棄榮入道現丈六身作比丘相普度一切廣誘世間隨機設戒種種調攝然此戒律不唯釋迦如來所制乃至十方三世如來所傳佛佛道同如是也故戒本云如過去諸佛及以未來者現在諸世尊能勝一切憂皆共尊敬戒此是諸佛法當時人法兩勝機感相投始於鹿園度五拘隣故世尊一呼善來鬚髮自落袈裟被體即時納戒以善根夙利自然冥合故也續以機性差劣不可以善來得度即以三語受戒所謂歸依佛歸依法歸依僧於此言下便得具體又復人性澆薄機緣轉疎不可以三語乃以白四羯磨納戒一白之詞三番羯磨也羯磨梵言此翻為業亦翻辦事以能辦僧中止作二業一切法事也大率以此方呪法能以心業同力秉之可使革凡成聖也仍置壇場立十僧行法壇上敷設佛像布列天神星像皆有所表今則我等比丘所受者即聲聞二百五十戒也其間五篇七聚罪相輕重與世官法典刑不殊如俗五刑古謂墨劓剕宮大辟今謂笞杖徒流死以佛教推之則三皇五帝周孔訓籍制立條法皆大權示化非凡智所能為抑亦過去古佛流及世世相循也今此佛法戒律即釋門中家訓也如來誡諸弟子有過失者當如法治之律中乃有七九治罰條而結之是以比丘非律勿視非律勿聽非律勿言非律勿行故國無禮刑莫治天下僧無戒律莫以御眾由昔迦葉問佛云佛法幾時當滅答曰隨說戒律滅處則滅也又論云毗尼藏者佛法壽命又曰我實不滅半月一來以戒法常在故是知住持佛法綱紀僧宗功在斯也今此戒經初篇四重謂波羅夷者此翻為棄以犯此罪永棄佛法海外不得預清淨僧中法食之數也此四者即婬盜殺妄譬之四樹以為根本下去諸篇皆枝葉也罪喻斷頭不復有佛法壽命故永絕道分也教中亦許伏首行懺但入眾時在僧末坐位同沙彌也次篇十三條僧伽婆尸沙者此云殘謂犯此篇罪覆一日即治一日覆一月即治一月所謂僧前與覆藏法後與出罪羯磨用二十僧行法乃至全淨有殘之罪由僧除滅也第三篇一百二十條波逸提者義翻為墮以此篇多因財事生貪染心飲居戲劇人多喜犯後墮燒煑覆障地獄第四篇波羅提提舍尼者此翻向彼悔以對人說所作罪也亦云此罪應發露也不者墮泥犁中三億六十千歲第五篇一百條眾學名突吉羅此云惡作乃是檢學僧倫威儀之要行也有犯即對首懺之此乃五篇之名就中離出偷蘭遮并惡說罪遂名七聚今現前比丘登壇稟受者即此具戒也諸篇所列葢是所止二百五十件過惡以至三千威儀八萬律行於一一行中斷其過惡又何止於此乃至微塵數威儀行相而比丘盡當謹而護之何也山河大地艸木藂林胎卵濕化有情無情一一根塵發得無作戒體智論云略則八萬四千廣則塵沙無盡然制法雖多不出現前三業所謂身處木叉口處木叉意處木叉當知此三即是毗尼藏也所謂篇聚總而謂之威德木叉木叉即持戒之果號由是始於鹿苑終至鶴林而囑累云於我滅後當尊重珍敬等此毗尼藏佛滅度後結集之時有窟內窟外謂之根本二部後復分為五部今南山律師所宗四分部主曇無德師即五部中之一也且夫持戒要在圓融識達其體況戒學屬於事相心法存乎理智自非戒律制約三業䇿勤四儀則過患奚以防禦也但眾生在惑業苦三道之中妄想顛倒不能守持多尚虗頭疎蕩放逸若然者須達其緣生法理也即此時持戒業性本空罪亦何有唯是從緣流變善惡隨彰持犯互見若了得緣生方不滯於偏執不著於有無即此以為中道義也故龍樹云因緣所生法我說即是空亦名為假名亦名中道義只此一偈下三句亦是助言要之不出因緣二字即此空假中三觀廣如天台教中所辨也若兀爾持戒不了觀慧此即人天福報亦乃聲聞自調之謂則不名究竟解脫又淨名云佛法不有亦不無以因緣故諸法生無我無造無受者善惡之業亦不忘舉要言之由因緣故即有諸法是則持戒者能達法空是名持戒即六度中尸波羅蜜也則不住二乘直趣菩提之果也又經云無有定法如來可說一切賢聖皆以無為法而有差別亦云一切有為法如夢幻泡影等大論云或云即心是戒何假他受未敢取焉何也以一切眾生下至蠕動蜎飛皆有佛性亦具佛禮以無戒善不斷諸惡輪迴生死受報無窮無由解脫所以十方諸佛三世聖人乃至彌陀淨土依正二報並由願心取證非誓不立亦須全藉信願行力之所莊嚴也恐煩久坐不敢廣述茲者伏承台斾寵臨講席久坐證明元照學問荒淺言理疎野不勝皇懼之至判府樞密伏願成化千里鎮撫萬樞長為聖世之忠謀永作教門之外護我皇庶境同集玅因能說所聞俱霑利益講罷樞密上詩以謝心淨佛土淨境空無一毫風柯響林薄華雨積庭皐說法龍象遶放生鱗羽逃知師精戒律功行不唐勞為義天僧統開講要義高麗王子弘真祐世廣智僧統義天同弟子壽良航海求法首登師門元豐八年十二月二十八日偕館伴主客學士楊傑就寺請師陞座發揚細要義天矍然避席作禮請所著書歸遼東摹板流通講曰現講四分律刪補羯磨疏正當第三卷明無作戒體今日更不進文略敘律宗綱要自古禪講凡欲說法先說一道理以通言路以謂一切諸法離相寂滅非言語文字所能詮非思量分別所能及故經云諸法寂滅相不可以言宣又云若如來有所說法則為謗佛不能解我所說義又云始於得道夜終至涅槃夜於是二中間未甞說一字又云生生不可說生不生不可說不生生不可說等世人聞此便謂佛法離言絕相都無所說然不知有因緣故於無說中不妨作種種說無說而說說無窮盡今日幸遇主客學士僧統國師同請陞座有此因緣故不免東道西說且酬來命耳經云凡有心者皆當作佛乃知一切眾生本具常住真精妙性其體清淨其用自在其相平等不分而分強說三義聖凡一體依正不二聖人得之而無所得眾生失之而未甞失然此妙性不離諸人現前一念覺知之心推之於心則為心推之於物則為物則知世出世間諸所有法同一真性等無差別故云一切諸法無非佛法此之謂也但其法體不守自性感物而動隨緣而變故諸眾生虗妄顛倒於清淨中而生染著故為煩惑於自在中而起纏縛故為漏業於平等中而起分別故為苦報翻彼三義而為三障流轉生死經百千劫受無量苦不自覺知真可憐愍是以如來出興於世為令眾生復本真性以方便力種種開示一代時教無非皆為趣一佛乘故云為一大事因緣出現於世所謂開示悟入佛之知見即令眾生了知自心無始煩惑當體清淨無量結業當體自在無窮苦報當體平等一法既爾法法咸然華嚴直爾而說法華作方便說不唯釋迦過去諸佛已說未來諸佛當說現在諸佛今說故云十方一切諸佛法亦如是西天二十四祖此方藂林禪德棒喝言句天台賢首開拓法門南山祖師闡揚律藏方便提誘皆為此事但由眾生宜樂不同致使宗途有異佛法不貴多說多誦說則是人能說未審以何方便而能造趣又復修何等行而得作佛學者至此多或遲疑往往世間學佛之人止以口說便為了當豈知生死道中一無所濟病苦臨身精神罔措此時方悔悔何及邪是故楞嚴經中阿難尊者蒙佛開悟身心明了方能咨請修證法門云我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入故知口說但自空解欲入聖道須修實行修行之門必先以戒而為基本是故如來始於摩竭提國菩提樹下成無上正覺初結菩薩波羅提木叉即十重四十八輕禁防心念為心地法門圓頓妙戒此即大乘以戒為先也大教門中廣大包攝以至比丘比丘尼國王太子天人鬼畜但解法師語者皆得受戒是故西天國王登位大臣受軄皆先求受故戒經云欲受國王位時受轉輪王位時百官受位時應先受菩薩戒一切鬼神救護王身百官之身諸佛歡喜等是知凡學佛者無論道俗皆須受戒也然此大戒但被彼菩薩大根眾生二乘小機即應絕分是故如來現生王宮入山修道六年苦行成等正覺始於鹿園先受三歸五戒次制出家受具足戒等此即小乘以戒為先也以至雙林告滅遺教其徒首云於我滅後當尊重珍敬波羅提木叉乃知戒是截苦海之舟航趣涅槃之梯隥故經云若無此戒諸善功德皆不得生是以當知戒為第一安穩功德住處又涅槃云欲見佛性證大涅槃必須深心修持淨戒又華嚴云戒為無上菩提本應當具足持淨戒若能堅持於淨戒是則如來所讚歎諸經論中廣有讚戒之文不能盡舉出家之人若禪若教以至房居所習雖殊未有不登壇受戒者也多偏學見學律者薄為小乘見持戒者斥為執相而不觀己身削髮染衣復不思自心登壇納具且受而不持雖受何益況眾生之心習惡日久如猿猴野馬難可禁制經曰心之可畏甚於毒蛇惡獸怨賊學道之人不可自欺敢問諸佛子一切時中對諸塵境如何用心如何調伏既云出家為求解脫若不奉戒解脫無因將何以為比丘之體將何以受人天供養將何以報四恩將何以入聖道將何以為世福田以何為自行以何為化他以何軌範僧徒以何住持佛法且如國家設禮樂以備君子立典刑以防小人此亦不異僧門所制戒律國無禮刑則何以治天下何以齊萬民僧無戒律則何以住持佛法何以攝誘徒眾故華嚴云具足受持威儀教法行六和敬善御大眾心無憂悔去來今佛所說正法不違其教是故能令三寶不斷法得久住又論云毗尼藏者佛法壽命毗尼住世佛法方住又戒經云如過去諸佛及以未來者現在諸世尊皆共尊敬戒是知戒律住持功大此並如來金口親宣固非黨助己宗作如是說即今在座諸佛子莫不皆登壇受戒或一夏多夏為比丘僧未審當時所受為發何心具何等緣為納何戒戒作何相請試思之出家之人一生大事宜切留心於此不明徒生徒死且現前色心無量劫來今生之中造生死業不可窮數惡心徧布充塞法界經云若有體相盡虗空界不能容受若得戒者則翻無量惡業悉為清淨戒體為善種子作成佛本基南山祖師云未受已前惡徧法界今欲進受翻前惡境並起善心故戒發所因還徧法界又云當知出家僧尼真是善法功德之聚位尊人天良由於此然佛世利機不假多制故如來於十二年中常說一偈云善護於口言自淨其志意身莫作諸惡此三業道淨能得如是行是大仙人道諸有聞者即能奉持生定發慧破惑顯理以此一偈度人無量中下根機不能堅奉方與廣制故有二百五十三千八萬無量律儀當知即是諸佛子等現前三業所造惡業業無量故戒亦無量業無盡故戒亦無盡如是無邊律儀不出二百五十二百五十不出四根本四根本不出三業三業起於一心是知即我自心流變而為諸業今翻諸業以為淨戒當知此戒還即自心更無他法此乃戒律之元宗奉持之要術也恐煩久坐不敢盡言元照學行寡薄於此一宗忝曾留意初心狂簡獵涉多知三百年來自覺衰病諸無所堪唯於淨土頗甞研究每以兩端開誘來學一者入道頓有始二者期心必有終言其始者即須受戒專志奉持令於一切時中對諸塵境常憶受體著衣喫飯行住坐臥語默動靜不可暫忘也言其終者謂歸心淨土決誓往生也以五濁惡世末法之時惑業深纏慣習難斷自無道力何由修證故釋迦出世五十餘年說無量法應可度者皆悉已度其未度者皆亦已作得度因緣因緣雖多難為造入唯淨土法門是修行徑路故諸經論偏贊淨土佛法滅盡唯無量壽佛經百年在世十方勸贊信不徒然修行此行須具三法一曰信二曰願三曰行信以入之願以導之行以成之非信不入非願不行非行不至故須發深信心立大誓願修種種行決定得生更何疑惑末世眾生惑業深重自疑自障不生深信或以理難事或將凡擬聖遲疑而不決聞說而不信葢不知此門全假他力彌陀世尊本誓願力積劫熏修功德之力威神光明攝取之力故經中造眾惡業火輪相現遇善知識教稱十念尚得往生何況畢世修行淨業復何疑乎常持此說以示於人往往其間或未深信每嗟同道鮮有知音近自嘉禾還有以主客學士所着決疑集十疑論二序為示觀其援據該博理論明坦與愚所知多有符契不覺驚歎自詣門下一見便蒙垂念有逾舊分乃知宿緣所追今復會耳況外護三寶助揚佛法人所同知真所謂現宰官身而作佛事已是知心不在莊贊但期同獲上品上生得佛授記却來娑婆教化眾生皆生安養耳僧統國師躡如來跡捨國王位為比丘僧効善財行不遠江山志求佛法當時如來入山修道於中途間以珍御服易麤布僧伽梨剃髮從道六年苦行爾乃成佛故知出家本為捨富貴割親愛少欲無為專崇道業近聞僧統已製布三衣乃諸佛標識出家正式願將來還歸本國以戒律住持興隆三寶令合國僧徒奉持衣鉢稟戒律範則佛日重曜法輪再轉矣甞聞有詩云滿眼有誰知我意沈吟却憶善財童又聞自號求法沙門此見平生出家本志矣輙以求法二字而為頌曰僧統號求法乃見出家心未審以何求為求便等法了知求即法無復更他求將求求佛法何不自求求上樝菴法師論十六觀經所用觀法書元照頃年過台州謁見于赤城此時詢及淨土事晚蒙示及惑對其間二三疑處摘以請益而不蒙見答過往同人傳其言意如見訝所以此際數相會並不敢措一詞元照仰慕吾丈學行非一日矣雖蒙以同輩待之然且衷心不敢輒易所以欲論及淨土愛師過耳凡鄉里講員未曾與之語碧泉累次見聞此人強戾自負非學道之器亦對之唯唯而已今亦欲師之相知略舉一端可否請試裁之大抵諸師章記並以十六妙觀混同止觀觀法故有觀心觀佛之諍約心觀佛之漫耳甞考諸大乘觀法能觀心雖一而所觀境隨機不同且說二種一以心為所觀如天台止觀賢首法界觀還源觀南山淨心觀以至少林壁觀等並指現前覺心體性為淨土如淨名心淨土淨圓覺地獄天宮皆為淨土誌公六祖等皆云即心是淨土不須求西方等此指理體為土唯佛一人居之眾生雖不離而未能顯圓覺楞嚴占察等諸大乘經所詮觀法皆是此方破惑入道無生理觀二以諸佛菩薩修成功德依正色像為所觀如觀佛相海經普賢行法經觀彌勒上生經觀無量壽佛經等題中標定能所分明此又三別一者觀佛相海經即觀釋迦普賢行法經即觀普賢皆不離此界而觀亦為破障滅罪助成理觀非求生也二者上生經即以心想天界彌勒內院求生彼天此二者不出娑婆三者觀無量壽佛經十六種觀並以送想西方十萬億剎之外彌陀依正莊嚴求生淨土是故初落日觀指其路頭至第三地想成已除疑破障葢心念已達彼方矣天台疏序云落日懸皷用標送想之方豈非明據今人說十六觀反令觀心乃是攝想豈名送想耶故知地觀纔成身雖未死心已往生修淨業人蓮池中已有華生良由於此諸師反以十六觀為陰境故云是心作佛是心是佛等且彌陀願力積劫修成清淨境界豈得反同眾生生死陰邪又云攬彼依正歸心觀之此由不辨兩土觀法各異但見本宗多贊唯心遂一混釋之嗚呼誤却多少人邪每一思及不覺潸然自諸師章鈔行世學教者多不生淨土鄉中諸老講員講却多少彌陀觀經臨終只在人家託生是為苦事却是行翁行婆不知教相直信而生者多矣若爾十六觀應非理觀疏中何以用三觀釋邪答非謂理觀只是觀心若達理則佛法眾生法心法皆是理也故曰一切諸法無非佛法觀一切法空如實相等當知能觀心所觀境修成淨業蓮胎淨報皆是因緣生法緣生無生即空假中何妨理觀但此方觀心理觀唯上根達理者可修若十六觀達者則為理觀不達者則為事想不妨皆生淨土但悟有遲速位有淺深耳而宗師見天台多用觀心遂將一代觀法作觀心解耳若不信者請以十疑論證之彼云智者熾然求生淨土達生體不可得此乃真無生熾然者猛盛也求生即能觀心淨土即所觀依正皆緣生法此則能所俱空即為無生也愚者為生所縛聞生作生解聞無生作無生解不知生即無生無生即生彼文第二疑甚詳請細看之今人乃云能所俱泯取捨皆亡方成圓觀若存能所即是偏邪嗚呼豈不與祖師相反乎又云以心想佛此是取捨生死心何能生淨土故談淨土者不取言能所取捨往來之義而不知能所取捨等皆緣生法緣生無生故泯能所取捨無生而生故不妨能所取捨不出法性故能所取捨無非自心若爾以心取境則非唯心義邪答祖師云凡欲修觀先了方法唯心但是了達諸法非謂唯心頑然不動都無心念故攝論云唯識義不失亦不無能取所取當知終日想彼淨土取彼淨業若能若所無非自心皆非他法乃至捨此生彼雖過十萬億剎未始出於心外只由淨穢唯心故使往來無礙譬如江南江北雖彼此往來而不出大宋天下非謂唯心守心不動非謂理觀凝然寂住若謂守心亡能絕所為理觀者祖師那云用標送想之方邪豈非送心往於彼方方名淨土觀法但了此能想所往皆緣生法即理觀也更有釋疑通妨不能細舉信筆寫去不成次緒望為留心思擇俯照志心如更不信請觀十疑論第二答并十六觀經大無量壽佛經等竊觀往古飛錫壽禪師等諸公雖苦勸往生亦為事理所礙縱令分辨終成混漫況餘人乎世謂先德文字一信其說況容情黨於其間遂不考是非遲疑不決又凡學人多以舊見為礙他人之言難為入耳儻令有取密知而已不敢外揚此皆人情非實心為生死者幸無以人廢言或狂有所不到專聽慈誨幸勿見外寫此書時不勝傾淚若或見悉彌陀會中願為法侶元照再白南山律宗祖承圖錄始祖曇無德尊者毱多弟子四分律主南山所宗二祖曇摩迦羅尊者本西竺僧始依四分為人受戒三祖北臺法聦律師本學僧祇因考受體首傳四分四祖雲中道覆律師聦之弟子最初撰疑科釋四分五祖大覺慧光律師從覆受律撰疏十卷廣開戶牗六祖高齊道雲律師承稟光師亦撰鈔疏判釋廣文七祖河北道洪律師承稟雲師亦有律疏未詳卷軸八祖弘福智首律師洪師弟子疏二十卷通貫群宗九祖南山澄照律師承稟首師廣有著撰見行于世律宗祖承燦然布于群紀往世宗匠未深考覈而卒意取捨有所異同從其門者各親師授是非異論不能一揆致使晚進輩踟蹰於兩楹間莫知其所嚮予病之非一日矣苟默默無所辨正而稱其裔葉能無忝乎此圖錄於是乎作也第一評古得失普寧律師法明始立五祖一波離二法正三覺明四智首五南山霅溪法師仁岳次立十祖一波離二法正三覺明四法聰五道覆六慧光七道雲八道洪九智首十南山又云若取苗裔須立十師若取功德應立七祖除光雲洪三師靈源法師守仁次立七祖一波離二法正三覺明四法聰五智首六南山七增輝記主天台律師允堪亦立七祖一波離二法正三曇諦四覺明五法聦六智首七南山已上引列諸家自下歷考得失霅溪靈源本經論之師既非學宗後絕遵奉唯普寧天台二家抗行于世甞考諸說俱所未安故歷辨之庶無封滯耳如四師並以波離為始祖其所不可者三焉且波離結集誦律即今僧祇根本部也四分一宗雖從彼出然派分已後本枝競行彼此相望號為異部序不云乎曇無德部鈔者所宗安有結集彼部之人而預此宗之祖此謂非今所宗一不可也又波離雖有結集之功不在傳法之數況曇無德師本承毱多毱多已上至于迦葉師承頗異安可混同又案南山內典錄云波離以律藏付弟子陀寫俱俱付須俱須俱付悉伽婆婆付目揵連子帝須須付旃陀䟦闍中間不顯名氏乃至付僧伽䟦羅是則波離別分一枝專弘上座一律安得橫以法正繼其後乎若謂佛世多所疑問者律中阿難身子請決尤多況身子請佛制戒為發起之端其功益大何不為祖若謂律序初標波離為首者此乃部主將與集律祈本眾聖以為證信而波離結集當眾之長故言為首耳苟泥此文必立為祖則餘身證者五百之眾同是所祈皆應為祖豈特波離乎此謂不係傳襲二不可也又歷觀西天付法藏傳此土經論之家未見取結集者為祖必如所立亦應經宗例以阿難為祖邪此無此例三不可也又諸家並立覺明者且覺明止是翻譯廣文亦非傳法又此附餘宗亦無此例況安清童壽法顯玄弉等傳譯功高亦應彼宗推之為祖靈源仁師立增輝者意以天台荊谿為例然天台筆記前代無聞自操染成章一家宗奉況荊谿之嗣天台非唯記述當大唐之世南北性相大振于時天台之教遏絕墜地荊谿禪師辭而闢之贊而述之其道由是牽復其教所以中興後學尊之為祖不亦宜乎今增輝者前代五十餘家後世改作猶將數本當今學者傳授幾希矧又律宗南山之後天下同風曾無建立興復之功輙廁宗祀是可得乎又天台堪師立曇諦者謂始翻羯磨即四分先蠶先農之人且曇諦之前已有僧鎧羯磨非諦始翻況行受戒功在法時曇諦但是翻文而已故法時傳云請胡僧出羯磨耳既而始翻由鎧行受因時先蠶先農其義安在況非傳授復無類例安足為祖請觀諸師所立俱非允當必欲強祀所謂非其鬼而祭之無乃諂乎已上斥其妄立自下責其遺漏自漢明之世佛教創傳至曹魏之初未聞戒法及行齋懺事同祠祀至嘉平年有西域僧曇摩迦羅依法正部行千人受戒改先妄習始立僧儀逮今千載之間天下釋子莫不皆受其賜論其功不在諸師之下況祖師事鈔兩疏內典錄等累稱其德而古今學者一槩遺之豈非戴天履地而不知其高厚乎或曰事鈔戒疏並序法時曇諦為此方戒律之先今則取時除諦其故何邪對曰凡預祖例不出兩端一者本乎相承二乃尊其功德時則依宗行受備具二能諦則循古翻文未全一德然則祖師所敘名有其由鈔疏則昭示教源故兼明曇諦業疏則正推本受而獨美法時豈敢任情葢存典據故也第二申今去留夫致必有宗學必有承教非宗則其學無所歸學不承則其教無所自南山律師宗於四分承於智首首承洪洪承雲雲承光光承覆覆承聰聰則初傳四分因考本受即承於時時則創行受法專依四分即承於正若乃遠推本始則法正承毱多多承和修修承阿難難承迦葉葉承我佛是則金口祖承一十四世今以四分開宗為始斷自法正而下至于南山躡跡傳通九人而聦首南山覆光雲洪則獨取霅溪至於推部主為始祖立法時為二祖則前代闕如始見今錄耳或曰法時自出僧祇戒心那為此宗之祖對曰今家唯取受體不論傳譯又曰然則受依四分那出彼宗戒本乎對曰大士弘闡非凡所籌事在濫觴化存由漸且如騰蘭至漢士庶雲從雖削染成儀而歸戒不舉此豈暗於教相有所不行直欲示其所遺推功於後迦羅翻戒其事例然已上敘立自下引證儒宗七廟並以祖考已上父子相因以存享祀其例一也禪宗六祖第付衣盂其例二也天台九祖相傳心觀其例三也以至西竺二十四祖繼世傳持師資迭授其例四也諸經律論次列七佛雖取空劫已前三佛足成其數亦將表示法道相承有由其例五也請詳諸例足為明據獨此律宗浪引結集翻傳之師間絕紊亂可謂逐流迷源尋枝忘本以故出沒互見得失相形終南已來五百餘年宗祖差訛傳持失緒考其所學可謂知本乎已上舉例證自下引文證然祖承之所出備見南山教部而非私說今第而引之戒疏序云四分肇興祖習綿遠正法初百便列其宗斯人博考三機殷鑒兩典包括權實統收名理集結斯藏通被時實據此以法正開宗尊為始祖明矣業疏云此方赤縣曹魏已前並不受具至嘉平年法時沙門依法正部行羯磨法十人受戒又云神州一統約受並誦四分之文據此法時遠承法正立為第二祖也行事鈔戒疏內典錄文亦同此續高僧傳論云四分一律雖翻在姚秦而創敷元魏是由赤髭論主初乃誦傳未展談授尋還西域此方學侶竟絕維持邇及聰覆方開學肆等相傳云法聰本習僧祇因考受體首傳四分據此聦師遠承法時故為第三祖也又論云自初開律師號法聰元魏孝文北臺揚緒口以傳授時所榮之沙門道覆即紹聦緒纘疏六卷但是長科至於義舉未聞于世據此覆師親承法聰即為第四祖也傳云慧光從佛陀禪師出家陀曰此沙彌非常人若受大戒宜先聽律律是慧基非智不奉若初依經論必輕戒網邪見滅法障道之源由是依覆師通四分等據此光師承覆故為第五祖也傳云道雲早依師稟奉光遺令專弘律部造疏九卷為眾所先成匠極多流衍彌遠加以威容嚴肅動止有儀談吐慈和言行相撿據此雲師承光故為第六祖也附光師傳傳云道洪據相州紹通雲胤容止沈正宣解有儀學門七百諸經論士將欲導世皆停洪講席觀其風略採為軌躅據此洪師承雲故為第七祖也附洪遵傳傳云智首二十有二方稟大戒預於古佛塔前請祈顯證蒙降佛摩頂身心安泰方知感戒及尋律部多會其文明若夙知後聽道洪律席同侶七百鋒頴如林至於尋文比義首言逈拔及玄思厲勇通冠羣宗剛正嚴明莫尚於首矣據此首師承洪故為第八祖也上至聰師並出續高僧傳即祖師所撰文見大藏輕重儀云先所宗承首律師者孤情絕照映古奪今鈔疏山積學徒雲踊齊流五部之輝通開眾見之表事鈔序云學有所承承必知本據此南山承首故為第九祖也厥後文綱已下師徒傳講至于今多矣然考其功業不足亞於前修故所不論也上據從本至末順而列之故以法正為初南山繼後葢俲儒家立廟之式若約從親至疎逆而推之則應南山為始法正為終例準戒疏云至後彌勒佛興即以尸葉為七祖也今日從眾略如上明或所未安以俟來哲元豐四年九月十五日餘杭郡沙門元照錄南山律師撰集錄宗承律藏部二十一件合三十七卷支開有五十九卷四分律刪繁補闕行事鈔三卷內典錄題云行事刪補律儀武德九年製貞觀四年重修或云八年或為六卷今分十二卷並後人支開然非本數有云祖師自分者非也見行四分律拾毗尼義鈔三卷有本題云拾毗尼要貞觀元年製後流新羅此方絕本至大中四年彼國附還元有三卷今始獲上中二卷未見下卷近人分中為下且成上數失其本矣今以兩卷開為四卷見行四分律刪補隨機羯磨二卷貞觀八年出二十一年重修本一卷後分三卷見大藏四分律刪補隨機羯磨疏四卷貞觀九年撰二十二年重修本二卷後增為四卷今分為八卷見行四分律含註戒本二卷貞觀八年出永徽二年重修本一卷後為二卷今分三卷見行四分律含註戒本疏四卷貞觀八年製永徽二年重修本三卷後為四卷今分八卷見行四分律刪定僧戒本一卷貞觀二十一年仲冬出刪定文詞備世誦習今時盛行四分律比丘尼鈔三卷諸錄不出今準後流通題云貞觀十九年撰今分六卷見行四分律註比丘尼戒本二卷貞觀中出本一卷後為二卷未見四分律刪定尼戒本一卷永徽二年出見行量處輕重儀一卷有云處量輕重儀貞觀十一年製乾封二年重修見行釋門章服儀一卷顯慶四年製此年重修見行護三寶物儀二卷未見律相感通傳一卷乾封二年製見行教誡新學比丘行護律儀一卷貞觀八年製永徽元年重修見行釋門集僧軌度圖經一卷武德七年製見行關中創立戒壇圖經一卷乾封二年製見行淨厨誥一卷乾封二年製見行護僧物制一卷或但云僧制顯慶四年製見行淨心誡觀一卷雖非專律部然本被學宗故於此列見行教俗士設齋儀一卷顯慶四年製未見諸方或立教藏更寫大律一部六十卷置於首弘贊經論部七件合六十四卷妙法蓮華經苑三十卷未見妙法蓮華經音義一卷未見有經論家指南山音義是也妙法蓮華經弘傳序一卷見經首眾經律論音義敘致一卷未見諸經要集二十卷今藏中題云玄惲撰隨凾音云道世撰又云道集道譯等皆誤也今據卷首祖師自序云甞於顯慶中讀一切經隨情逐要人堪行者善惡業報條出于此述篇三十勒成兩帙冀道俗依行等則驗非他撰明矣見大藏大唐內典錄十卷麟德元年甲子於西明寺撰見大藏註時非時經一卷未見護法住持部十五件合七十六卷廣弘明集三十卷見大藏結集正教住持遺法儀六卷杭州祥符賢聖藏有本集古今佛道論衡三卷開光錄云前三卷龍朔元年撰第四卷麟德元年撰故或為四卷見大藏東夏三寶感通錄三卷麟德元年六月於清官精舍集亦云集神州三寶感通錄見大藏釋門護法儀一卷未見護法住持儀一卷未見佛法東漸圖贊二卷顯慶五年製或云化佛未見佛教東漸化跡一卷顯慶五年夏中製未見聖跡見在圖贊一卷名出內典錄未見住法圖贊一卷顯慶五年製後分二卷見行釋迦略譜二卷麟德二年九月十八日於西明寺撰或云釋氏譜或無略字或云一卷見大藏釋迦法誌四卷永徽元年撰或云二卷見大藏感應圖錄一卷未見感通記十卷未見付囑儀十卷宋僧傳云從天人口傳偈頌號付囑儀未見禮敬行儀部四件合六卷釋門正行懺悔儀三卷永徽二年季夏製未見有指方等懺者恐是六時禮佛懺悔儀一卷或云六時禮文顯慶四年製見行集佛經六時行道儀一卷見行釋門歸敬儀一卷龍朔元年撰見行圖傳雜錄部十四件合八十四卷續高僧傳三十卷或三十二卷見大藏後集高僧傳十卷開元錄云尋本未獲高僧傳音義一卷未見高僧傳鈔一卷一云要錄或云二卷未見祗桓寺圖二卷乾封二年製未見圖經一卷乾封二年製未見舊連書於上故省祗桓二字終南山靈感傳二卷乾封二年於靈感寺撰見行衮法師別傳一卷未見廬山遠大師文集十一卷或云十卷未見支道林集十卷未見南山文集十卷未見西明寺錄三卷顯慶四年製未見初撰西明寺記一卷顯慶四年製未見終南山化感寺制一卷乾封二年製未見已上五類總五十七件計二百六十七卷若約小卷則二百九十卷又諸家目錄互出不同內典錄列十八部一百十四卷開元錄列八部八十一卷見今藏錄列九部一百四卷且據見者如上所錄餘俟後來續之佛教流及此土自後漢至曹魏僅二百載從其化者但剪落殊俗而已歸戒則未甞稟焉至嘉平中曇摩迦羅者至自西梵闡化京洛始依法正學宗立十僧受戒仍出僧祗戒心用輔隨行祖師所謂東夏戒律之先者是也逮至姚秦首譯十誦以夫真教濫觴源流未辨攝修之侶於即承用是則納體從乎四分戒本誦彼僧祗隨行宗於十誦宗部之亂由茲始矣爾後四分僧祗五分三律繼翻有以先出戒本詮相允符故僧祗一部獨盛當世降及元魏聰師探源究本尅體辨行遂輟舊所習首講四分道覆而下章疏出焉已來傳習之英遞代不乏然猶羣部乖競假實爭驅化制兩宗混而未判首師披釋宗緒雖分而行事謀猷亦未甚詳備逮于南山律師出於隋唐間博究羣宗獨權戒學稽極聖之洪範追法密之遺蹤顧乎舊章哀矜乎後學由是著撰興焉大抵得意在乎行事故首述事鈔統四藏括兩乘區別異部搜駮眾說實維持之宏綱發趣之夷經也其次拾義鈔者拾毗尼之祕要戒業疏者展止作之毛目故得受隨體相持犯重輕眾別儀軌治心理身日用之行盡矣故凡預吾門者其所習雖異而日蒙其賜無得而稱豈非數仞之墻得其門者寡矣天時之雨物無謝於天乎自是九代諸師之作蔑如無聞歿後數百年間霈然莫禦非四依大士垂示像季者其孰能至於此哉自外鈔註傳錄儀集圖紀或發明己宗或贊述經論卷帙繁富不可遽數但地之相遠歲之相後況經會昌之孽五代之亂諸宗典籍率為煨燼故祖師之訓亡逸過半矣且夫教者所以辨其道文者所以持其教文或墜則教不存教不存則道不明故文之於世是可廢耶是以在昔尊道輔教之士患斯文之將喪甞攬諸名題集為別錄使來者得其名而獲其本其所列亦已博矣但搜括未詳時代差誤布厝紊雜不足披撿今以內典開元等錄及戒疏後序諸文批誌看詳對會重纂一本各從其類節為五科以其遠惡清身行根道本者莫大乎戒律故有初也窮神蕩累莫深乎經論故有次也持危禦侮必在乎弘護故有三也克勤自進必假乎軏度故有四也勝迹光遠必藉乎傳錄故有五也至於卷數之開合年曆之前後若見行若遺逸或編入大藏或標題不同悉備見于註仍不媿蹇陋輒繫序于後庶覽者識吾宗之大略焉時皇宋元豐改號之歲後安居日餘杭郡沙門釋元照重錄貞和三年丁亥大蔟五日前泉涌老比丘淳朴於竹園軒看讀挍訂之次卒點旁訓云今寬文九年孟秋下旬更挍潤色之以壽梓流世矣欲繼法燈而永照迷闇濟羣生而遠沾妙道忝浴祖恩欽擬報答云止止堂老乞士中訥翁
