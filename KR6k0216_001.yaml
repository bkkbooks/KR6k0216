body:
  text: 餘航郡沙門元照戒體章熙寧三年後安居日釋元照於南山祖師羯磨疏録出戒體章𮨇先賢後進議論遞作得失互見故直敘大略云夫戒體者律部之樞要持犯之基本返流之源始發行之先導但由諸教沈隱道理淵邃是以九代傳教間出英賢雖各逞異途而未聞旨決逮于有唐獨我祖師窮幽盡性反覆前古貶黜浮偽剖判宗旨斟酌義理鼎示三宗誠所謂會一化之教源發羣迷之慧日者也然而聖師既往文存理隱故使任意私説殆六七家各謂指南寧知所適既無是處不益後來例皆不引此時子隆亦出章門言依業疏三宗出體嘗考始末得在破他失於自解今須破者由名字相濫諸宗義學所惑當時故略責四過使是非區別一大小混濫二圓義偏乖三妄分兩體四輒隱聖文初大小混濫者彼謂四分假宗種子為體增暉亦然但取種子上功能為別且種子者尚非經論權淺所談何況小乘律部耶又若謂假宗體是種子者非色非心又是何物耶又假宗既言種子後立圓教戒體何為耶如此妄言顛亂教旨不可輕恕二圓義偏乖者圓者融通貫攝非異非偏義也彼説圓教戒體乃云因作業種熏本藏識永為種子此即戒體不同假宗外立種子也假宗何曾言種子為體又種子唯一何言不同既曰不同何名圓義又云自淺至深三宗迭廢既容相廢可謂圓乎今釋圓義與彼天別如下可見三妄分兩體者彼將圓教中文自意強分作無作二體其妄又甚且圓不分者由融會假實指破前二即前之體是圓之體故不可別分彼不知此意故多妄説又自知不曉乃云然此戒體亦多議論可以意通不煩敘矣用語驗心心亦可見四輒隱聖文者祖師疏文之立宗詮體文義廢立靡不周備而彼竊疏名目少參自語題為己立匿聖之咎何可勝言其間妄説更多且略提小耳嗟呼時變人浮勤名惰學欲其發暉教宗規範來裔百代無古者吾不得見也故使祖師遺訓戒體極談幾于熄矣猶賴垂文不墜明若星日貞如金玉故幸得而聞也是以專依疏本録出別行猶痛未詳故略言其大要初多宗作無作體二俱是名可知二成宗作戒色心為體亦可知無作以非色非心為體者然非色非心止是攝法之聚名實非體狀遂令歷世妄説非一今依疏文即名考體直是密談善種但以小宗未即徑示故外立名非色非心也故疏云考其業體本由心生還熏本心有能有用乃至云不知何目強號非二細詳此文未即言善種而曰熏心有用密談之意灼然可見應知此即考出非色非心之體耳子隆不知便言四分種子為體紊亂宗緒深為不可問此既密談顯在何處答如下圓教豈非顯也問有人言四分戒體探入大乘其義何耶答教宗既曰分通談體何名探入故知非也三圓教者略分四段初明圓義謂融會前宗的指實義前宗兩體即善種子攬本從末此善種子即前二體攝末歸本是則約此圓談任名無在故疏云於此一法三宗分別故知分別有三體實不二餘如下説問若言體唯是一分別有三者則前二宗中但有虗名竟無實體耶答宗雖各計體豈乖殊由彼謂異強搆他名應知多宗計種為色成宗計種為非色心但後圓教指出前二耳故疏云愚人謂異就之起著等更以喻陳如世美玉或人無知謂玉為石或名非石未能顯體後人得實指破前二若無玉體何有不識喻今三宗相似法也二正名者已往諸師或名思種或名熏種然思熏屬作種是無作今召無作何得相濫或名種子者種通善惡是亦不然今正此名善種為體故疏云成善種子此戒體也言善則簡惡不言思熏則無濫也問何因緣故名為善種答善則是法體種是譬喻謂塵沙戒法納本藏識續起隨行行能牽來果猶如穀子投入田中芽生苗長結實成穗相對無差故得名也三大小同異者問此與菩薩戒體為同為異答體同緣異言緣異者大則三歸四弘請師問遮三番羯磨諸餘法式與今小宗兩途逈別言體同者以緣為旁助心是正因緣疏因親體從因發前既心發上品故知今體即大乘故涅槃中白四所受持息世譏嫌與性重無別即同此意若爾經論所説菩薩戒心性為體此則善種何言體同答彼經論中自分二體一當體體即是戒體與今善種不殊二所依體如上所引心性是也然則心性但是戒體所依實非戒體故今不立也問體若同者持犯立懺諸餘行相如何分別答體雖約圓行必依受既受從當教故行相無差如疏云出家菩薩形位同諸聲聞又釋迦佛無菩薩僧諸大菩薩入聲聞僧依夏次第即其意也若爾持犯既依教限出體何必約圓答體既多途故須圓會律儀不異故得就宗又依教奉持則受隨相應約圓開解使域心於處既開顯大解依小律儀即成大行豈須棄捨方曰大乎故疏云常思此行即攝律儀等深有意旨不能繁述問此與天台圓教為同為異答理同説異何名理同以下疏中引法華文用法華意立此圓體但彼教統攝此局一事將此入彼即彼妙行之中戒聖行也何名説異今此為明戒體直取佛意融前二宗自得此談非謂取彼但名相濫是故異也四立圓教本意者多成談體并諸論師各據教限互計不同考實求深終非了義然大聖示迹專為一事出家所懷唯修出離若不了斯戒體縱令持護瑩若明珠不免輪回還沒生死事既深大是以吾祖大師推佛本懷窮出家意跨入大乘位立此圓教直顯實體極接時機欲使懷道者識知本體發起大行不論凡小徑蹈大途大慈深祕於茲見矣故下疏中廣有勉勵是故行人常思此行即三聚戒展轉修顯果獲三佛等又云今識前緣終歸大乘故須域心於處矣又云何得不思致虧發足廣如下説上來括下大要序冠于首俾智者觀序則文無壅滯矣存道同志深須留意誠謂出世要術修行徑道平生大事此何自輕自非吾祖聖智誰能顯彰而況祖師舉唱之後漸流于今滅絶斯致故使學戒律者罔然無所適甚可悲痛是則隳摧昔妄重揚聖言實用益於後來匪規名於當世知吾祖之道者或一二人則其心有所寄也深願勇志研精同謀荷贊極深聖意勿妄宣傳戒體章終持犯體章將説所持犯體大分為二初敘昔傳次伸格義所以然者南山云若不敘昔非則不敘後説理固然也就初分三一增輝二教二後悟無作三會正萬境初中又二一因破體狀兩分二正論所持犯體且初增輝云能持犯以心為體身口是狀所持犯以制聽二教為體事法是狀是則體狀各別名義乖矣夫體者物本之通名狀者即體之相貌非狀無以彰其體是故體狀兩標名相雙顯所顯之物本實無異即體是狀即狀是體譬如人身四肢為體雖知其名不委四肢相狀如何故知必應以兩肱兩股骨血皮肉是其相狀是知體狀是一不可離也要而言之謂此中所明持犯體之相狀何必攻異輒自區分頗乖聖意不足依也問縱分體狀理有何失答有二失也一暗文二迷義何謂暗文如鈔文云身口是具又云所對事法何嘗有言此謂體狀又戒疏中言體則不言狀言狀則不言體既文互舉則知體狀不殊此暗文也云何迷義且如彼云小乘單心不犯罪也然則律雖不制單心而不形身口結遠方便大鈔則身口業思戒疏則重緣向念若言能持犯以心為體身口是狀者則遠方便罪體犯而狀非犯矣以非身口故又懺吉羅故犯對首誤犯責心若言以心為體身口是狀者則誤犯吉羅狀犯而體非犯矣以非心故是知體狀互闕持犯義乖此迷義也近世學流相沿未省都無悛革封懷守株何可窮也二正論所持犯體者增輝云若不約教持犯難明故以心為能以教為所又自問曰凡言所持犯境一切皆是以受時起心遍於法界受後森然萬境何事非持今約二教為體豈非局狹答對境雖多不離二教攝之皆盡以行人隨中所對之境不簡情與非情善惡事法若非制作制止境即是聽作聽止境是知持犯不能自分約其制聽方知分齊二教既收萬境故以制聽二教為體也文竟今詳上義因而誤解亦有所由以見鈔云所持犯體對制聽二教以明而不知此標能攝之教失究以明二字故有斯立今破云且能所二字乃詮顯文義區分彼此使其易明故也若云萬境雖多不離二教攝之皆盡是則境為所攝教為能攝明知二教全乖所義如何立為所持犯體邪或曰持心對教以分能所借令此説且二教所詮通該心想如諸戒末並明境想想即是心如一殺戒心亦多種或想差心闕疑心息心等並教所明又如掘壞等戒故心明犯制教所攝誤開不犯聽教所攝二教既攝持犯之心則可以制聽二教為所持犯體邪如上所責略知非相不煩引也二明後悟無作就中又二初辨定二正斥且初世有章文傳云增輝後悟所持犯體約文據理諒非增輝真筆蓋後人出於自見妄託增輝之名欲誑後人信奉世所謂狐假虎威之儀誠其然也二正斥彼云所持犯以四行無作為體即是隨中無作與前無作戒體不別亦屬非色非心也文竟噫吾祖去世將五百載真味澆訛有至斯甚者固非先聖化緣不洽蓋後昆宿業所迷競規述作之名罔著釣深之績致使寡知新學取捨無從或有滯理封文望風附勢者則曰增輝僧録後悟斷無失矣如斯頗衆何足與言今略敘彼非無宜固執若如上引以四行無作為體與前戒體不別者且四行之中二持無作與受體無作俱是善法縱汝所説猶可為同若兩犯無作體是不善與彼受體善惡歷然受體是善兩犯不善云何妄云四行無作與受體無作不別邪止用此求不攻自破會正云後悟以四行為體因有錯破貴耳故也三會正萬境者此師立境為體亦出增輝之義故增輝云萬境雖多不離二教攝之皆盡斯可知矣問萬境為體於理如何答萬境為言通及能所如鈔序云持犯之境境通內外內謂行心之結業外謂情事之順違內即能持外即所持也既云境通內外是則能持亦得名境故知境為所持犯體名有濫於能持犯體也又復鈔文戒疏明二種體都無萬境之言出自喉心未足依據更有諸濫如下問答中對辨也大科第二伸格義中分二初正明體狀二問答除疑初中今準祖師大鈔戒疏始終詳勘定以二教所詮一切事法為所持犯體此正義也言事法者各具善惡二種一言善事者即衣鉢體量善法者即一切教行良以凡情蕩逸不樂進修是以大聖制令遵行故令行者勤學奉持名為順教即作持也懈怠不為是名違教即止犯也於此善事善法有順有違故作持止犯由之生也二言惡事者即淫盜殺妄言惡法者即五邪七非良以凡心計著障道之本是故大聖制令不為故令行者對治禁禦名為順教即止持也恣情造境是名違教即作犯也於此惡事惡法有順有違故止持作犯由之生也此略舉要其餘制聽止作鈔疏備矣今謂於上善惡事法心起順違故有二持兩犯生焉違順之心即能持犯體善惡事法即所持犯體持犯既因事法而生故今以一切事法為所持犯體豈不然乎然則世迷來久信解難生必憑聖言可得依據今試引之戒疏大鈔皆約制聽二教對明止作事法為所持犯體故鈔云所持犯者對制聽二教以明下云所對事法懈怠不學既前云對二教以明下云所對事法是則約二教對顯一切事法為所持犯體斷無惑矣又鈔序云持犯之境境通內外內謂行心之結業能持犯體外謂情事之順違所持犯體彼云情事此云事法文雖少異理實大同又戒疏云持犯之生皆從法起違順教相故有犯持據房為言事法分二等單言法者文之略耳故下接云事法分二也此諸明據事法之體顯矣違順之義彰矣若謂不然且持犯一篇七門詮解何故獨於體狀門中論止作事法邪以此驗諸正義彌顯二問答中問向斥諸師皆言無據今立事法為體疏鈔亦無的指之文如何彈彼立此邪答教旨極明人情自昧且如鈔云言所持犯者對制聽二教以明下云所對事法又云對二教中事法兩種則知上標二教即能對能明之教下云所對事法即所對所顯之體也由事法兩種二教統收罄無不盡若非二教齊限莫分是故先標二教而對顯事法故下文云今分二教攝法分齊也上既云所持犯者對二教以明對明之物既是事法是則事法為體文理顯然云何妄云文無的指問事法與境尅性為言若為同異答彼立萬境謂淫則三道盜則四主觸目現前人心對望名為境也事法不爾未必境現但是二教所詮若止若作一切事法即是其體莫非於此心起違順持犯斯作故今立體與彼懸殊可更思議問縱云萬境理有何失答舉戒以説境或有無良難定指自有無境而成犯者如忽起淫心犯重吉羅若據此罪但是心犯不待境現或有對境不成犯者如諸戒開通中或有緣故雖對前境不名為犯如掘壞等戒可以類通或有一犯緣多境義互闕者如大妄語為前人是境為口説是境若云所説聖法是境且身造口業不假口言得大重罪則言非境也若云前人是境屏處説聖亦得重吉則人非境也媒房等戒境亦難定略提二三趣知而已具此諸異境不可立問若如上釋如諸戒後皆明境想云何而言境不可立答律教詮相各有所明豈得混然雷同一用由諸戒後將心對論假名作境顯持犯相既約心對論則知必待起心對治前境始可名持起心陵犯前境始得名犯應知心對境時可名為境故諸戒末心境對談事法不爾未持未犯居二教中自名為體猶慮未了敢以喻陳如世俗刑條在編册但名刑法其間不無假事顯相如今之事法是也必有民犯隨彼所對約科治法如上境義於此又知事法體通萬境局狹何以故由對境則體具不對則體滅可以明也問萬境為言觸途皆是云何上云境是局狹答為體是局望時甚通時由通故又不可立何謂時通如佛未出世雖有萬境未有持犯故出世已最初行非不名犯戒是知萬境持犯不生由佛制後事法顯彰方有持犯又作持中一切善法佛未制前無違教過亦由制後持犯始生豈非萬境通漫邪是則事法為所持犯體於茲又明或救會正者問曰會正萬境與今事法體無有異但將境名召事法耳答祖師明指事法何得輒自改張況事法萬境名體天別如上分析安可濫同彼又曰境召事法正符鈔文事法為體義亦無爽答會正記中科判已乖若作此救揚其醜耳彼將體狀一門大分為二一彼言能持下直至攝生義足以來科云明能所二種體狀二從今分二教下直至末文科云辨二種相攝分齊明知彼認攝生義足已前立二種體狀已竟與下相攝分齊一科都不相涉且今分二教下正明事法則合科於所持犯體中彼即科絶驗知會正不認下科事法是體也據此以求不可迂救問若以事法為體者既涉二教與彼增輝若為取別答制聽即能攝之教事法即所攝之體然增輝認能為體與今令異故彼文云所持犯以制聽二教為體也然此二教非即是體具如上斥今則不爾以二教中所攝事法為所持犯體能所區別寧復致疑持犯體章終持犯句法章夫一大律藏所論其持犯二字云耳苟不精之其猶網不得其綱裘不得其領也吾祖南山澄照大師其提綱振領者也於是刪補事鈔次十五篇委辨二持二犯伸張大義駿略古非意在彰律學之淵沖楷後昆之衢術故題云持犯方軌是也但文高而理淵言簡而義博雖後來者章記之廣解釋之異而未能備如也止如二九句法可學九句歷代相遵不可學九句互彰異説元照始惑之也一日上請於師所云不循諸記之説直示南山之文豫雖聞之患不聞諸朋友遂考其流鈔兼諸舊解是非交明冀識者之取捨耳但破二記其餘可知增輝則曰此後九句約解處生迷學人疑不識處並是迷心皆須放罪中間止心不學人於先解處迷心即放若未解處即明白可學中收也若由來不學人明白心中尚自不會即無迷忘須在前九句中辨也當如亦不放根本也又云一切心境皆是可學學知已後忽起迷心方是不可學也已上彼文豫曰未可也若云不放不學者且可學中是愚於事犯如不曉初識是人返疑夷是殘等不可學是迷於事犯如迷人為杌木迷夷為殘等愚迷既別安可混之假如有人生乎不學心想迷忘將人作杌木想殺若就彼説莫不犯夷邪莫不更結不學無知邪鈔云一切心境皆是可學但迷非學了故佛一切開律云備具三種業當審觀其意又母論云犯必託境關心成業此諸明文何止放學人乎若云須待學知方有迷者假如有人發心始學學之未通故將人作杌木想殺若就彼説莫不犯夷邪莫不更結不學無知邪況初學人明白心中緣而不了尚自不結不學無知豈得迷忘而結乎鈔云若作心學未知不結無知罪斯明證也厥後會正解文雖盈數紙而始末相反殊無所歸且如彼云此後九句上品三夷中品三蘭下品或蘭或吉餘二十四枝條準今師約迷則開文云今師以迷心望之則於事犯根條俱放豈有事開犯結乎又云學人疑不識處事上開放六根本及餘二十四枝條不學人準境想亦開故立後九句也準此三節即不論學不學人但約迷忘根本枝條俱放也彼又問云不學本自不識何有迷忘答雖是不學必有想迷者豈彼不開前云但迷非學了故佛一切開豈簡學人不學人乎今所以分者為結枝條有無耳若據此文似不學人迷忘中唯放根本不放二十四枝條罪故曰今所分者為結枝條有無耳以斯差異故後人各計不同或有説云學不學人俱放者或云不學人唯放根本不放枝條者然雖紛紜俱乖正理借令彼云俱放者且鈔中不學人結十二犯上枝條罪文云由不學故不識是則明示犯結安可俱放乎抑又本為結表易明故立二九句法若云俱放止可獨用明白一九耳其迷忘九句全無用也二持中全不用餘二門但用上半三句以有根本方便罪故下半三句亦非用也鈔云便結罪易明故分二九句何得獨用一九邪復次作犯門中料簡句法徵問答釋其文將及兩紙若云俱放則説不通往往有人指為順古增輝如此謬之甚矣況下文云極為分別不知鏡否豈徒為哉又若云不學人唯開根本無妨結二十四枝條者何故鈔中但云十二不言二十四邪彼之徒則曰以犯例事亦有十二共二十四也此乃不關教典出任脣心但知黨扇於師不覺反張其醜如斯之輩何足算哉上且略為對辨其餘破于下文或問豫何謂也曰豫讀南山文從南山見為之説也何哉夫南山立迷忘九句學人疑及不識事犯俱放故鈔云受戒以來勤學三藏於境迷忘遇緣而造者隨相境想具之豈非通放學人乎不學人事上有疑不識放六根本及十二枝條犯上疑及不識結十二枝條不學無知罪故鈔云此三三句各下二句疑及不識句別各有不學無知二罪合十二罪釋云由不學故不識豈非局結不學人乎然則大師於不學人事放犯結大有意也以事是迷心故開犯由愚教故結如迷人為杌木得不開乎疏鈔並云事是可學想疑忽生雖緣不了聖不制犯又業疏云若元不緣境非學之功亦同前免即同學人放也是則事開之意明矣如平生不學人事雖迷忘犯實無知得不結乎鈔云罪是可學以不學故不識佛言不以無知故得脫更重增無知罪戒疏云罪是可學若有迷者皆結其罪又云論後九句三品各三由不識事境非可學不妨於犯是可學故致列其相事總而罪別是則結犯之義彰矣噫南山之文雖遍天下而天下絶聞其義非一日矣昔諸記之不曉遂輒判為古義甚之惑也又使後學從而惑之乃相傳云釋相頭持犯尾迷殺律師不用鬼豫愍斯道者久矣固不得已復為引之注而伸之庶乎讀南山之正文知餘説之無謂也鈔文止持門中列不可學九句訖乃云此三三句中各下二句疑及不識句別各有不學無知二罪合十二罪亦望不犯根本名為止持此正明不學人犯結也為不學人迷事愚犯故犯上結十二不學無知罪此十二罪望不至根本得名止持諸記指為古承也但事是可學以想疑忽生雖緣不了聖不制犯此決難應先難云犯既結罪事何開邪將文答之謂事是對境起迷緣而不了故事上根條俱放故曰聖不制罪也若據戒疏接云罪是可學若有迷者皆結其罪當知今但出事放所以也問如殺盜等人非人想有主無主想律結無罪亦有制犯者何答或緣罪境人非人故便結心犯緣非罪境無主物故然彼迷心不結正罪莫非緣罪故有無不同此問上想疑二字意謂若云想疑忘生事上根條俱放者何故律中境想有犯不犯邪答緣罪有無故也又不同前段以法事俱識故是可學有疑不識皆制罪也此亦遮疑應先難云此中疑及不識事放犯結如何前九句疑及不識事犯皆制罪以文答之謂前明白可學故結此是迷忘不可學故開故不同也若爾後緣法中亦有想轉如不處分處分想及疑亦是不犯重何為制罪若爾領上辭謂若云不可學人緣事不了放根條者後作持門中緣法亦有想轉亦不犯殘後既同此亦合事故根條犯上結十二罪未知至後作持中若為制邪徵意如此宜細詳之此徵凡有二意一雖論作持意在決通後三門也故下並指如前段後九句是也二暗破古義以古人作持不通不可學故此徵之答中指後後復指前貴在作持有不可學異於古人之義也答此且據止持中約事為言必如所引對法有二九句後作持中更為辨也謂此約事論法如後説故曰更為辨也二記指作順古答已上是今所解若準二記解釋今非如下節為六段辨之也一謂此三三句下是古義也並云且順古結如下問破也豫曰若如此説且吾祖大師立理破古不無其致如云廢昔義如昔解有人云今解不然不爾等苟鈔文簡約則彰乎戒業二疏云何至此而不標邪是知諸記一無所據擅遏為古迷晦後人失之大也二謂但事下今師以事例犯破古結罪之非也會正云事既無罪例犯亦放應知作今師義解也又疏中但事是可學直至聖不制犯一同鈔文下接云罪是可學若有疑者皆結其罪彼見接文不能通會使於發揮指為順古此又自言相戾甚也而況疏鈔文義一同云何而言鈔中是今疏中是古邪決無此理三謂問答因而生也增輝云今師本意要在事開犯結而問答中却論事者猶同善陳而解堅圍欲取東南而看西北迂巧之説不足取也且夫問答徵難各有所由問必防於後疑答乃決通前義其或答辭求備方假徵通此事不深兒童尚解豈有前問境想後徵犯結乎孟子云所惡於智者為其鑿也增輝之謂焉四謂若爾下今師以法徵古結犯也並云疑法不識法既問例今犯法亦須放也若此解文一何孤起豈獨孤起抑又於理全疏且作持門中處分説淨等以律中羯磨辭句故得法名若以心境相對必竟是事此例於犯者屈南山為不善立理者也五謂律句順古也會正云且順古答今若師以迷心望之犯則根條俱放豈有事開犯結乎若然者豈南山自徵復為古師通義有之乎且大師所遺文字二百餘卷若此道理實未有也六謂上文結罪且順古人今師所徵者為放學人也今師確執不足語也噫甚矣今為陳之首疏釋止持二九句云且事是不可學雖疑不識聖不制禁學不學人俱放彼以惡事不可學作故也罪是可學法故有疑不識悉皆制罪不學結學人放也已上彼文若謂徵放學人者且古師何嘗結學人乎此又誣罔古人也上且略辨若破判為古義凡有十餘科不能繁録但依今解詳而讀之靜而思之則一篇持犯猶反諸掌何古義之有乎豫細詳諸記不亦有由也以見戒疏有犯結一問遂執問辭用為正義而不識南山自於迷忘中事開犯結之理也況迷明二心句法出自吾祖大師之獨見與古片無所涉焉可混亂乎是故由之一訛直至于今不復省也南山云持犯之相實深斯言信矣問今利根之人生雖不學自達犯相若於事犯有迷云何結邪答此同學人俱放也例如可學初句雖云不學不結無知以生知故問前引母論云犯必託境關心成業云何不學人迷忘不開犯上十二罪邪答既素不學知即是愚教故非迷也若爾事法亦不曾學何得開邪答事法境現心對境迷故須開也迷人為杌本斯可知矣抑又不學無知但便違犯冥然而結故鈔序云不問事情虗實並名犯也餘如前述持犯句法章終律鈔宗要略為十門餘杭沙門元照述初明撰述來意通別為二就初通意略有四焉一者弘闡聖教酬佛恩故二者副本悲願成就自利故三者拯拔諸有脫苦向道故四者維持三寶安住久遠故華梵兩土四依賢聖凡興述作莫不由此故云通也次明別意略亦有四一者律藏浩博卒難尋了故教興中云攝誘弘濟軌用實多貴在得其本詮誠難核其條緒尼鈔序云恐大本難通勞而寡效又戒疏序云本律廣而難求等並符此意二者歷代傳述繁闕未馴故鈔興意云諸師所存情見繁廣今並刪略等下文云故即補闕返光九代是也三者為令辭簡事要直備行用故序云庶令臨機有用即事即行又云載舒載覽隨事隨依等是也四者被及來蒙省功無惑故序云用濟新學之費功焉又下文云鈔者本為新學不廣義章等餘不備録舉要如上總斯多意故有斯文生焉二明教主差別通約經論佛有三身大小兩異大如他述小在今論一者軌持聖道是為法身復有二種一二乘所證滅理涅槃名理法身二三祇修行五分果圓名事法身二者積因所感是為報身亦號生身即王宮誕育丈六金軀三十成道八十唱滅者是三者變化應機是名化身亦號應身始於鹿苑化諸外道變化非一任機不同故先德所引瞿師羅長者見三尺之身五百婆羅門覩灰塵之相是也今據律部乃於化相報身之佛以為教主然佛之為體理非離隔雖曰報身必兼法化若據大乘別明尊勝之報王宮丈六乃是劣應之身此中欲辨教源須明説教之主教既大小有別主亦勝劣不同故略敘身相粗分衢術至於委論同異非今所宗故略而不述三明説教時分佛初成道始説三歸五戒善來八敬三語羯磨等受自宣略教以誨時衆及乎漏生次第隨制徹至涅槃遍乎一化不可定約但佛滅後以類結之故有前後是以古德判律為通始終教者不其然乎義鈔云始於鹿苑終至鶴林隨根制戒乃有萬差斯為明證然就化相大約為言且據鹿苑初來小乘所攝至論隨機立教不局斯時四明三藏所攝佛所遺教集結為文聖賢判釋所立各異或為三藏四藏五藏八藏統而論之無越三藏名含大小故須揀之一曰修多羅藏大如華嚴涅槃小即四含遺教等二曰阿毗曇藏大如中智地攝小即成實婆娑等三曰毗尼藏大如善戒梵網小即二部五部等問三藏所詮若為取別答彼明理體戒疏曰餘藏明理理在虗通是也律詮事相鈔題行事可不明乎又彼為化教化該道俗此是制教制局出家如序第七門明之可解又復彼明定慧治五住心惑此明戒學禁七支業非又彼多導解則現通説法以通收律唯制行故憶念攝修而總攝且舉諸例粗識教源然今學宗即當小乘毗尼藏也又五部之一非餘他部至於鈔文上下通用三藏攬為一宗隨律之經斯之謂矣五明乘有通局復分為二初明兩宗二明五乘初中一代聖教不過大小人理教行一一不同然須略識淺深之相且就一家約本受體則分三位一者十誦多宗名當分小乘教也二者四分成實正小兼大名過分小乘教經部分通即其義也三者圓教全是大乘今鈔正依成實旁用多宗終歸圓教蓋取涅槃顯性談常重扶之意是以序中正存第六持律標宗所引華嚴涅槃諸大乘經論廣明持毀發心受戒為成三聚出家學本志求解脫懺六聚罪事理雙明凡此諸例若非圓意焉可用之學者臨文無宜混濫良由以小望大則大小懸殊以大攝小則小無不大故下引勝鬘經智度論並以聲聞毗尼即大乘學又戒疏所引大集經中五部雖異不妨諸佛法界涅槃又引無量義經云法水一也江河井池分其異耳今宗準此諸意並以圓意用通律乘如昔光師直以四分判屬大乘大為浮漫近世相承以為至説此全不曉大小分齊今應問曰四分是大孰為之小又問為求四果為調三毒令盡制增戒學開結淨地魚肉正食此等文意如何通之又鈔云此教宗是何乘業疏云律是小乘等何不思邪或有不許分通專判為小此又不了假實兩宗教之優劣且分通之義出彼部計豈容人情輒爾抑塞過猶不及此之謂也次明五乘者世謂戒律人天教也今謂不然戒通多種非止人天且約下文以明多別一者內實腐爛外現完淨諂媚邪求勝他名利等此名賊分齊也下云違則障道不免三塗此雖號持與犯不異二者畏墮三塗不樂為罪此名罪分齊約義以求但障惡道報止人天或執為道以謂尊勝此戒見二取利使所收三者猒離下趣求生天樂此名福分齊若但奉持還至欲有由是事亂體非靜業色無色有尚非其分如何一槩判在人天四者三乘聖賢斷證雖殊建修之始莫不由戒此名道分齊故律云除結無礙縛著由此解又經云戒為無上菩提本所據明矣良以法王垂化意存破有若為世福則與輪梵凡王不分優降是以一代名教至於三歸微善悉為入道之門矧乃具足律儀豈專以人天為語乎今明戒學直是伏業方便滅惑遠因統論則為三聖之前驅剋意則同三聚之圓行略提如此餘在二疏廣之若爾不立餘二應無五果而序云五乘軌導又戒經序云欲得生天上若生人中者其意何邪答五乘者凡聖合論言三乘者唯在聖道戒疏所謂鈍者引以世報利者以惠資成斯並隨機設化當尋本據如序云戒淨有智慧便得第一道當尊重正法又云欲求於佛道若執彼語此復何通故知報有利鈍致使教有淺深不體此意則後學無歸一家宗乘觸途成滯今人不學但言律是小乘人天教爾故特詮敘永袪謬濫六辨定宗旨西土傳教流派非一此方所弘空有偏盛機執既異教旨須分言有部者即十誦律主薩婆多師所計三世等法悉有實性故名一切有部又號實法宗即婆娑俱舍雜心婆多等同其流也言空宗者即四分律主曇無德師所計五陰諸法從衆緣生無有實性故號空宗但有名字號假名宗不專小典兼通方等故名經部亦即分通成實善見是其類矣今略引二宗法相對明差別一果人通局異彼稱釋師子唯在一佛此明諸佛文指三世義該十方各如戒本二觀法異彼計人空法實折破留一鄰虗塵此則人法俱假所指其唯空寂三境界異彼則約根對境此則識別諸塵四起業異彼約界繫用判諸法身口善惡欲色兩界大種所成並歸色聚此宗雖通三業必審觀意善惡所起並指心成故云離心無思無身口業是也五戒分多少異彼五八十唯發四支比丘方具此宗七衆七支齊禁六重非重異彼宗戒不重受亦不重發夷不重犯此部反之七導俗異彼局時數此無不可八秉宣異彼則開增制減此則增減俱非九捨懺異彼須永棄此則還用十受隨異如後二門上且略引諸條粗知彼此自餘緩急輕重事用兩立備在隨文此不具敘今宗四分正當假宗雖用實法不隨彼計討論之士臨文詳而審之七明所受法體依羯磨疏三宗分別一者多宗作無作戒二體俱色身口方便相續善色聲作戒體也非對非礙法入假色無作體也今師究體乃謂善惡業性天眼所見歷然可分與中陰同微細難知異彼肉眼所見粗色故云細色二者成宗作與無作二體則異身口業思能造身心作戒體也非色非心五義互求了不可得無作體也祖師考體即心造業熏習有用能起後習心不可狀假色以顯所發業量異前作戒與心與色兩不相應強名二非以為戒體三約圓教宗明體但以兩宗各隨所計義説動靜終非究竟故跨取大乘圓成實義點示彼體乃是梨耶藏識隨緣流變造成業種能造六識即是具戒作成之業梨耶所持即號無作所蘊業因名善種子業雖心造一成已後與餘識俱性非對礙復是四大所造體有損益天眼所見善惡可分是以如來隨機赴物或説非色非心或説為色小機未達計為色者不許空宗執非色非心者斥他有部如涅槃中皆由不解我意故使諍計殊途然今所宗並以涅槃終窮之説統會異端使歸一致可謂體一化始終裂後昆疑網故業疏云終歸大乘故須域心於處如斯明訓廣在彼文今人所受正當成實假宗非色非心是其法體約圓以通即善種也然此所述略知端緒至於業理極為深細自非積學良恐茫然摸象紛紜於今衆矣八明隨行限分即持犯也然持犯義廣且明三業成就處所即為三別初多宗結犯不約心論鼓動身口始成持犯由彼所計謂是小機非力分故若制心犯無由得脫但防身口粗現業非耳二者成宗犯由心起藉身口成論其制限據戒疏中重緣向念可得思覺即入犯科不制心業據單意耳三者大乘獨頭心念即判持犯問若為取別答大乘初念成宗次念故號重緣多宗身口動心非業若爾成宗既約意犯即通十業與大何殊答業疏云四分發心相同十業但約瞥爾重緣以分深淺今宗限分可不明乎九就文科判自古章記互立不同例取彌天古式分為三分初序為序分序緣起故彼云兩序如下引破二三十篇為正宗分正陳三行故三批文為流通分批志囑付故然比附經稍非其類又有例準業疏以標宗為序分雜行為流通分中間二十八篇為正宗分此亦微有可取上且遵古今就正宗約義以求復有多別初判三卷者初案下序文自約三行用分三卷如後廣之二者上下兩卷既明衆別羯磨即作持行中卷釋通戒本即止持行止作二行實律藏之二輪焉三者中卷遵仰戒體即是受體也上下兩卷衆別要行即隨行也受隨二戒即毗尼之宏綱耳次判諸篇者初案雜行篇中前二十六篇名由途相攝古科但據下卷前十一篇如後所破末後三篇為別類統收中間一篇即諸雜要行二者初一篇標宗勸學集僧已下廣張行事故知標宗文局上卷義通一部三者前二十九篇雖包羅三藏統歸本宗最後一篇雖對簡本宗正出他部四者餘篇雖兼下衆正在大僧沙彌及尼局收彼衆五者諸篇通被道衆導俗化彼在家六者釋相則條理隨相為前後之所依諸篇則散指刑科實宗歸於釋相上且略分餘在臨文更自陶練十明宗簡濫自昔諸師章記並以小論名相隨文結釋劫數涅槃四果等廣列章門碎分端緒連文纍紙長引浮辭非唯不善宗途抑又翳於文理嘗原斯致自唐三藏慈恩等師以百法因明婆沙俱舍盛振于時播流宇內逮于近世江浙之間其風未墜宗師未達輒將彼學濫釋己宗天台賢首例為參亂世莫知之彼弘經者漸已刪除獨斯律宗玉石未辨故諸古記凡立義章大乘則用唯識瑜伽小論則取婆沙俱舍其引用也則先列頌文次伸廣解其釋義也則率遵三藏盡取慈恩先達未窮後昆寧曉於彼律相曾不討尋聞彼名言翻矜玄妙師資傳授習以成風焉知紊亂宗乘翳昏後學每一思及不覺潸然故此曲而論之諸賢一為詳鑑且夫就師請業必有所承今時學律莫不皆謂宗仰南山率稱裔葉且南山遺訓二百餘軸曾無結釋辨惑之文果後世增加亦奚足為準故其所不可一也其次俱舍等論出彼有部今傳四分乃是空宗安得以有部名言釋空宗教義業疏所謂宗骨顛倒理味差僻摘揣過濫何可勝言此其所不可二也又斯鈔所興意存省約仰觀聖智懸鑑未萌先示針規預杜斯謬故其序云猶恐後代加諸不急之務增益其中使真宗蕪穢行者致迷鳥鼠之喻復存於茲日矣故諸廣記可不然乎此其所不可三也又經教宏博從學有宗三藏所詮鼎然自異經律論師由來自別若乃詮教理之淺深辨行果之階漸既屬餘藏盡讓他宗今學戒律職歸行事辨定持犯裁量輕重擊誘初學匡持像運清身口之業非撿威儀之遺失此為本矣自餘名教不得已而用之非敢私言祖師明訓人所未見故曲示之戒疏大妄戒中斥古云有人依解廣竪義章動經他日意所異也舉宗以明持犯為正自餘隨律之經略知名相而已諸經論師自分宗體彼尚不解律刑此豈橫知他學縱有前聞亦不得述費時損日徒張無益自宗猶困於未聞況餘經論何由道盡可謂不識分量也須臾死去莫浪多事等請考斯文無事冰執聞義不徙吾寧不憂此其所不可四也若爾俱是聖教那不許學況復疏鈔時復引之何事輕言輒見排毀答野哉斯問是何言歟但為混於教宗豈是抑令不學南山所謂縱有前聞亦不得述可不明乎諸文撮要助釋今宗豈比後人別開戶牖前所謂隨律之經略知名相而已又何得不明乎大小乘論律師臨終口授門弟子守傾執筆大小二乘半滿兩教佛法關鍵修行大途世多不曉故曲辨之有謂學律為小乘聽教為大乘參禪為最上乘經云十方佛土中唯有一乘法無二亦無三豈有多岐哉又復世人見講經論者謂之小乘見參禪者謂之大乘斯皆寡學無稽之論夫大乘者謂發菩提心行菩薩行忘己利物歷劫不捨小乘者猒苦求樂樂出三界獨善一身唯求脫離略示大途今為細辨大分五門一曰正名二曰示體三曰辨行四曰明功五曰簡異初正名者梵云摩訶衍摩訶翻大衍即翻乘入此乘者謂發菩提心人即經所謂發阿耨多羅三藐三菩提心者阿耨多羅此翻無上三藐三菩提此翻正等正覺此即如來果上之號諸經或曰發無上道心發大乘意發無上心皆略言耳誠能發此心者即是佛心即下佛種衆生界中若有一人能發此心則三寶住持佛法光顯羣生依賴三界導師今人但言發菩提心不知發心之理口雖云發心實未發也徒有其名而無其實二示體者欲發此心須知發處未識此心依何而發今依二經略明其相金剛般若云若有善男子善女人發阿耨多羅三藐三菩提心者所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我當令入無餘涅槃而滅度之如是滅度無量無數無邊衆生實無衆生得滅度者此則明示菩提心體普賢行願第九願云言常順衆生者謂盡法界虗空界十方剎海所有衆生種種差別所謂卵生胎生濕生化生或有依於地水火風而生住者或有依空及諸卉木而生住者種種生類種種色身種種形狀種種相貌種種壽量種種族類種種名號種種心性種種知見種種欲樂種種意行種種威儀種種衣服種種飲食處於種種村營聚落城邑宮殿乃至一切天龍八部人非人等無足二足四足多足有色無色有想無想非有想非無想此普賢菩薩明示菩薩心體如華嚴十住十行十回向十地廣説乃至法界衆生即是諸佛菩薩菩提心體更非他法一切諸佛萬行莊嚴河沙果德皆從此生若無衆生定無生處是以發此心者誓入五濁惡世垂手提耳種種方便成熟衆生雖證涅槃而不離生死種種方便勸化調伏皆是成就無上菩提無有邊餘經云如一衆生不成佛終不於此取泥洹又經云我觀十方一切諸佛無有終窮入涅槃者唯除方便示現耳又經云無有涅槃佛亦無佛涅槃何以故衆生無盡惡業無盡煩惱無盡故也三明行者既知衆生是菩提本即當運廣大心起無礙行於如是等一一衆生種種承事種種供養如欽父母如奉師長及阿羅漢乃至如來等無有異於諸病苦為作良醫於失道者示其正路於夜暗中為作光明於貧窮者令得伏藏菩薩如是平等饒益一切衆生何以故菩薩若能隨順衆生則為隨順供養諸佛若於衆生尊重承事則為尊重承事如來若令衆生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野沙磧之中有大木王若根得水枝葉華果悉皆繁茂生死曠野菩提木王亦復如是一切衆生而為木根諸佛菩提而為華果以大悲水饒益衆生則能成就諸佛菩薩智慧華果何以故若諸菩薩以大悲水饒益衆生則能成就阿耨多羅三藐三菩提故是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺此即普賢明示大乘行也四明功者既發此心能行是行則於世間得大饒益依經略説十種利益一者順道益經云若諸菩薩於此大願隨順趣入則能成熟一切衆生則能隨順阿耨多羅三藐三菩提二者獲福益經云若有善男子善女人以滿十方無量無邊不可説不可説佛剎極微塵數一切世界上妙七寶及諸人天最勝安樂布施爾所一切世界所有衆生供養爾所一切世界諸佛菩薩經爾所佛剎極微塵數劫相續不斷所得功德若復有人聞此願王一經於耳所有功德比前功德百分不及一千分不及一乃至優波尼沙陀分亦不及一三者破障益經云或復有人以深信心於此大願受持讀誦乃至書寫一四句偈速能除滅五無間業所有世間身心等病種種苦惱乃至佛剎極微塵數一切惡業皆得消除四者摧邪益經云一切魔軍夜叉羅剎若鳩槃茶若毗舍闍若部多等飲血取肉諸惡鬼神皆悉遠離或時發心親近守護五者自在快樂益經云是故若人誦此願者行於世間無有障礙如空中月出於雲翳諸佛菩薩之所稱讚一切人天皆應欽禮一切衆生悉應供養六者獲果益經云此善男子善得人身圓滿普賢所有功德不久當如普賢菩薩速得成就微妙色身具三十二大丈夫相七者離過益經云若生人天所在之處常居勝族悉能破壞一切惡趣悉能遠離一切惡友悉能制伏一切外道悉能解脫一切煩惱如師子王摧伏羣獸堪受一切衆生供養八者不失善根益經云又復是人臨命終時最後剎那一切諸根悉皆散壞一切親屬悉皆捨離一切威勢悉皆退失輔相大臣宮城內外象馬車乘珍寶伏藏如是一切無復相隨唯此願王不相捨離於一切時引導其前九者往生淨土益經云一剎那中得即往生極樂世界到已即見阿彌陀佛文殊師利菩薩普賢菩薩觀自在菩薩彌勒菩薩等此諸菩薩色相端嚴功德具足所共圍繞十者生彼獲記益經云其人自見生蓮華中蒙佛授記得授記已經於無數百千萬億那由他劫普於十方不可説不可説世界以智慧力隨衆生心而為利益不久當坐菩提道場降伏魔軍成等正覺轉妙法輪能令佛剎極微塵數世界衆生發菩提心隨其根性教化成熟乃至盡於未來劫海廣能利益一切衆生五簡異者一者發心異小乘發心專期脫苦畏炎炎火宅如鬼虎龍蛇求寂滅涅槃自在解脫大乘發心非謂脫苦愍念三界受苦衆生誓入五濁惡世三界六道拔濟羣生令其出離衆生未盡不離三界二者境量異小乘發心斷惡修善不出三千大千世界大千界外曠無一物即是所證涅槃之處所謂二乘出三界也大乘發心修菩薩行盡十方法界通如華嚴不可説不可説極微塵數剎佛剎微塵數世界盡是菩薩所期境量也三者教主異小乘之人華葉內百億釋迦中一世界一釋迦也一世界外更無佛土一釋迦外更無他佛小教所談限齊至此大乘則以十方世界一切諸佛法報應身以為教主若自若他同一佛性四稟戒異小乘則以五戒八戒十戒具戒俱名別解脫戒發得禪定名定共戒發得無漏慧名道共戒破三界見思證四果羅漢大乘則以十重四十八輕八萬威儀戒善戒經瓔珞經所述不同無非發菩提心行菩薩行名為大乘戒五趣向異小乘之人一向求出三界火宅自安其身大乘之人一向趣入五濁惡世三途八難垂形五道調熟衆生六造行異小乘之人隨所動用無非利己不能利他大乘之人動必利他無非救攝三有衆生護持三寶令法久住七趣果異小乘之人修因證果初果二果乃至四果證真空涅槃趣寂滅樂大乘菩薩從初發心直至十住十行十回向十地等覺妙覺斷盡無明三惑永盡二死俱忘證大涅槃常樂我淨四德之樂雖證涅槃不捨生死十方剎土隨機應物如水中月隨類説法如谷答響盡未來際無有窮盡上來略辨大小二乘教門差別餘如經論不可具書已上五科略舉梗槩餘如華嚴及諸大乘經廣演分別此乃諸佛出世之大事群生獲遇之妙緣若不曉此徒稱傳教謾説參禪豫觀向上宗師雖云出世利人祇是光榮一己雖十方諸佛三世如來四辨八音百千方便更有多説無出吾言各請細詳如説而發如説而行展轉流通佛種不斷始終戒要夫三聚者圓修之戒德也律儀聚者攝一切止也善法聚者攝一切作也饒益聚者攝一切慈也舉一即三非前後也含生所無必造作之所得也悲夫識藏不顯蓋三妄之所覆也故惡染翳乎清淨愚癡蔽乎智慧愛憎阻乎慈悲然茲三妄乃無始之故業也於是大師憮然歎曰一識體內絶虗妄之因緣塵沙境中蘊無邊之聖法但衆生迷倒不念受持莫之能護由是立乎三誓淨乎三戒翻乎三妄成乎三行趣乎三脫證乎三佛止誓者斷一切惡受攝律儀戒翻惡染業成清淨行趣無願解脫門證法身佛作誓者修一切善受善法戒翻愚癡業成智慧行趣空解脫門證報身佛慈誓者度一切衆生受饒益戒翻愛憎業成慈悲行趣無相解脫門證應身佛然茲三誓三戒三行三脫三佛非各別也非異時也本受無作具諸德故然此三聚修之必爾迷茲三聚轉縈三妄妄返藉于三誓誓立發乎三戒戒發起乎三行行起成乎三脫脫成證乎三佛從因至果非漸修也説之次第行非次第大綱如此網目可尋
