body:
  text: 六世法孫道詢集授大乘菩薩戒儀大覺世尊一代時教大小兩乘戒有五種一者五戒二者八戒三者十戒四者具戒五者菩薩戒前二即被在家士女次二即攝出家五衆上之四戒隨心廣狹通大小乘皆為方便五菩薩戒純一大乘成佛之法十方諸佛示生唱滅種種方便為令衆生自省己靈本來清淨無諸垢染本來平等無有高下本來自在無諸礙無始迷倒枉受輪回因佛開示始悟衆生與佛同等既自悟已立丈夫志發菩提心受菩薩戒修菩薩行究竟成就無上菩提證大涅槃安住祕藏是謂諸佛出世大事因緣然菩薩戒凡有兩宗一者華嚴部二者法華部梵網經云若受菩薩戒者國王百官比丘比丘尼乃至庶民黃門非人畜生但解法師語盡得受戒此即華嚴部通漸頓受也善戒經云欲受菩薩戒先受優婆塞五戒次受沙彌十戒次受比丘具戒後受菩薩戒譬如重樓四級不由初級而至二級無有是處不由二級而至三級無有是處不由三級而至四級無有是處此即法華部唯從漸受也今在家士女受者則專依梵網出家僧尼受者則通稟二經今且依梵網通攝道俗世所盛行廣明受法略有四種一曰戒法二曰戒體三曰戒行四曰戒相初戒法者天台疏云最初妙海王子從盧舍那佛受菩薩戒即為法身大士制十重四十八輕乃是心地一品耳據梵網大本一百十二卷六十一品戒文下指八萬威儀品等即知制法量等塵沙由制心地動心違理遍衆生界心無量故制亦無量衆生無盡戒亦無盡除十重已外一切皆結輕垢罪即知輕垢不可限量遠古諸佛同一楷模佛佛相承傳至今日非獨寂場舍那始制或云佛立一切戒戒我一切心我無一切心何須一切戒故知但能對境一切無心何必受戒答曰若的無心可容無戒汝自審量果無心不且位階等覺尚有無明亦未無心逮至妙覺妄念永盡具身口意三種不護故知唯佛無一切心而衆生界未盡尚有大慈悲心豈同木石頑然無知謂無心哉是故諸佛果上起用說法利生悲智方便善巧提誘未始暫息良由以無心故無所不心安有恣放作惡不奉戒律謂之無心哉故戒經偈云如過去諸佛及以未來者現在諸世尊皆共尊敬戒則知三世界人證此戒已尚皆尊敬而具縛下凡自言無心不須戒者昧心逐語不知分量若此之甚是可憫也或曰了心即佛豈假他求本淨無瑕何勞受戒答佛有三世不可混同遠古諸佛過去佛也十方剎土現在佛也法界衆生當來佛也故戒本偈舍那佛云我是已成佛汝是當成佛又下云常須自知我是未成之佛諸佛是已成之佛言佛是同已成未成則異若謂凡夫即同果佛頓廢進修便生上慢未得謂得是大妄語自陷陷他為過不淺涅槃云衆生佛性如雜血乳豈比醍醐又圓覺中衆生覺性如金在礦豈比精金祇由心本是佛故可發意勤求祇由心本清淨故須立誓受戒當知菩薩戒者直是識心達本成佛菩提之要術此謂戒法也二明戒體有三初能受心即得戒之本二所緣境即發戒之處三所發業即無作之體初能受心者即大菩提心慈悲誓願所謂斷惡修善度生三誓攝一切願無不具足如普賢十大願勝鬘十大受藥師十二願彌陀四十八願皆即本時戒體矣行願經云諸佛如來以大悲心為體故觀經云佛心者大慈悲是若無誓願即不發戒則無體也二所緣境即法界衆生依正等法戒依境制體從境發境既無量體亦無邊行願經云因於衆生得成阿耨菩提是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺淨行品云若諸菩薩善用其心即獲一切勝妙功德經中自問云何用心乃列一百四十一種當願衆生即知一切衆生是諸菩薩因行果德所出生處若非生境戒則不發何有體邪三所發業由菩提心緣衆生境起大誓願剋志要期攬法歸心心與法合發生無作成善功德為佛種子由種熏心有大力用能起後習直至成佛究竟果滿百福莊嚴威神妙用由茲為始經云知法常無性佛種從緣起論云三十二相無差別因皆由持戒而得即斯謂也故南山云以此要期之心與彼妙法相應於彼法上有緣起之義領納有心名為戒體是也或云衆生本有佛性即菩薩戒體今謂不然本有之性蠕動翾飛一切皆具菩薩戒體受者方有不受則無此則因緣構造修起之法性雖本有非修不發如摩尼珠具足衆寶不假緣求終不出現天台疏云不起而已起則性無作假色南山云熏本藏識成善種子此為戒體天台性之一字即能起因無作假色即所發體南山藏識即所依處善種子即能依體能起所依是本有之性所發能依即今受之體若此出體文據極明能所歷然體性不濫則受納無疑修持有託此謂戒體也三明戒行既發此體當起隨行專精保守如護明珠一切時中不令忘失恆憶恆持恆防一心三用念念圓修遠離諸惡攝律儀戒也修習諸善攝善法戒也將護衆生饒益有情戒也始發三誓次行三戒終獲三果即法報應三佛身也願行相副目足更資如車二輪如鳥兩翅此謂戒行也四者戒相此有二種既奉圓戒三業動止莫非利物自行化他美德彰顯香聞十方衆生喜見隨所化導如風偃草無不伏從經云行於世間無有障礙如空中月出於雲翳此即約行為相也梵網戒本十重四十八輕名種條別一一條中復有多相皆須誦持依師求學體究持犯方名清淨故戒本中囑令善學此即以法為相也二皆可別故總名相此謂戒相也凡欲受者先須明曉心境無昧則奉持久固若所受不明此猶可恕必能授暗託受定不成即戒本云是自欺誑亦欺誑他人一一不解一切法而為他人作師授戒者犯輕垢罪制法若此凡為師授可不誡乎今準天台所列六家儀式并古今諸文參詳去取且列十科以備時用第一求師授法第二請聖證明第三歸佛求加第四䇿導勸信第五露過求悔第六請師乞戒第七立誓問遮第八加法納體第九說於示誡第十歎德發願第一求師授法準梵網經應請二師一和尚二阿闍梨今但請闍梨授戒師耳經云若千里內無能授戒師得佛菩薩像前自誓受戒而要見好相便得戒準知戒師不為多得戒疏云必是出家菩薩具足五德一持戒清淨二滿足十臘三善解律藏四深通禪思五慧藏窮玄地持云必須戒德嚴明善解三藏堪發彼敬心方可從受不爾得罪今依菩薩戒羯磨文請之教者云夫欲受菩薩戒必先請師䇿導開解令於一切境上起慈憫心若非此人戒無從發今為汝請此某人作授菩薩戒師故須專秉一心恭陳三請大德憶念我某甲於大德所乞受一切菩薩淨戒惟願須臾不辭勞倦哀憫聽受三請戒師答云可授汝菩薩戒當攝心諦受不得浮散第二請聖證明戒師先為請三寶諸天同來作證由佛出世建立戒法當須志誠運想隨師召請云弟子某甲稽首歸命一心䖍請盡虗空界極微塵剎常住三寶清淨法身毗盧遮那佛圓滿報身盧舍那佛千百億化身釋迦牟尼佛當來補處彌勒尊佛極樂世界阿彌陀佛過去七佛賢劫千佛十方三世一切諸佛大小兩乘毗尼戒法十二分經甚深法藏文殊師利菩薩普賢菩薩觀世音菩薩大勢至菩薩十方三世諸大菩薩最初得戒妙海王子西天此土傳法祖師四依菩薩緣覺聲聞三乘賢聖惟願慈悲聞我奉請顯現道場證明受戒弟子某甲一心䖍請護法諸天大梵天王帝釋天王護世四王天龍八部三界萬靈五星六曜今年歲分賞善罰惡一切天神大宋國內五嶽四瀆名山大川江河潭洞主執龍神當州地分城隍社廟屬內神祇諸處寺院護伽藍神守正法者惟願聰明聞我召請同賜降臨悉來守護弟子某甲一心䖍請十方法界六道四生一切含識現前受戒合道場人無量劫來生身父母先亡後逝上代宗親亡歿已後未解脫者願乘三寶威神力故俱到道場同沾戒善第三歸佛求加凡欲受戒先須歸依由無始來背捨三寶隨逐邪魔沒溺生死無所依歸故於今日翻邪歸正立重誓願畢此一生盡未來際歸投三寶乞求加護直至成佛承事供養不相捨離十方法界已成正覺一切如來是為佛寶十方法界諸佛所說十二部經是為法寶十方法界三乘賢聖是為僧寶仍了自心一體三寶與彼境界無二無別普賢行法經但云今依大乘甚深妙義歸依佛等今依天台戒疏引什師所傳梵本受三歸法應須合掌互跪隨師語云我某甲從於今身直至佛身於其中間歸依常住佛歸依常住法歸依常住僧三說三結並同上但云歸依佛竟等三結已云哀憫覆護我令法種增長此世及後世願佛常攝受此出勝鬘經說已稱三寶名釋迦佛云云第四䇿導勸信諸佛子此菩薩戒是三世十方諸佛成佛菩提基本諸大菩薩修行模範若不受此戒欲脫生死苦無有是處欲破業障無有是處欲入菩薩位無有是處欲成佛果無有是處華嚴云戒是無上菩提本應當具足持淨戒若能堅持於禁戒是則如來所讚歎涅槃云欲見佛性證大乘涅槃必須深心修持淨戒梵網經云衆生受佛戒即入諸佛位又云若不受此戒名為外道邪見人輩畜生無異木頭無異薩遮尼揵經云如來功德之身以受戒為本以持戒為始故知不受菩薩戒者縱學佛法勤苦修行經千萬劫祇名衆生欲脫輪回終無得理是以西竺國王受位百官上位皆先受此戒蓋欲饒益境邑人民寧可受已破不可不受若受已破是佛弟子若不受者是名外道經云薝蔔華雖萎猶勝一切花破戒諸比丘猶勝諸外道諸佛子六道之中無量衆生受三途苦不聞佛法縱得為人生處邊夷不遇佛法或遭亂世不遇佛法荒迷聲色不遇佛法愚癡邪見不遇佛法今既生值明時遭遇佛法諸根明利識知善惡佛法僧寶處處興隆可謂萬劫難逢千生一遇若不自省自䇿自立自修諸佛威神無為汝處無常迅速生死無期一旦橫骸識神無主欲受佛戒何由可得還沈惡道長劫受苦未有出期如來說為可憐愍者丈夫剛猛得不自思邪如是種種隨機䇿勸令發勝心第五露過求悔凡欲受戒思念無始已來三業六根所造諸惡無量無邊說不可盡若不發露障戒不發障淨土門障菩提路追過自責仰對三寶求哀懺悔護國戒經云佛言若諸佛子欲得成就阿耨菩提若欲善能知自心者若有欲以大慈悲手於生死泥拔衆生者應先發起大慈悲心普為衆生歸依三寶受菩薩戒發菩提心至誠懺悔當隨師教作如是言惟願十方一切諸佛及與地住得金剛智諸大菩薩當證知我當憶念我我某甲等發菩提心未住妙道今將身命歸依十方一切三寶惟願諸佛諸大菩薩起慈悲心哀愍攝受我某甲等自從無始流轉已來處在三界生死輪中沈溺惡趣入苦籠檻顛墜諸惡無明羅剎有大力勢諸煩惱冤長夜逼迫無主無救無歸無依無有所趣無有教導住於邪見險惡道中趣向生死背捨涅槃入三惡道不能自出墮於險惡廣大深坑追逐惡友隨順惡教遠離一切諸善知識都不覺知何者為損何者為益何者是善何者是惡為不善法繫著不捨棄背一切三乘聖人長夜常為生老病死憂悲苦惱種種業惑之所羅網憂迫恐怖恆失本心自性寂靜遠離種種三摩地門陀羅尼門諸地諸忍波羅蜜多甚深住處亦復遠離慈悲喜捨諸菩薩戒四無礙智六通十力四無所畏無忘失法無住涅槃一切隨眠我身具足一切功德我身空無七菩提分八聖道分如是等法百千萬種悉皆遠離無數苦惱障礙留難恆所惱害惟願諸佛諸大菩薩起大慈悲哀愍護念為我為主為救為歸為依為趣願令我等速得圓滿大菩提道及為無量菩薩眷屬如來十力四無所畏四無礙解十八不共四攝三昧解脫總持六通諸度福德智慧如是一切諸功德海願令我等皆得具足次當說罪求悔至心懺悔弟子某甲自念此身無量劫來於諸衆生無慈悲心故相殺害互相食噉不念衆生皆惜身命不念衆生具有佛性不知衆生是我先世父母六親縱恣口腹貪嗜滋味與諸衆生作大冤結以是因緣墮落生死流轉三界不生淨土不得成佛從今受戒誓斷殺害常行慈憫不食衆生身分血肉以此淨業普與衆生莊嚴淨土誓求作佛弟子某甲自念此身無始時來於諸衆生無饒益心故相侵奪不念衆生護惜財物與己無異斗稱欺誑虧刻於人侵損常住現前僧物貪他吝己不知厭足以是因緣墮落生死流轉三界不生淨土不得成佛從今受戒誓斷偷盜常行饒益救濟貧苦不生慳吝以此淨業普與衆生莊嚴淨土誓求作佛弟子某甲自念此身無始至今於諸男女耽染淫色不擇親疏不思觸淨趣向前境作非梵行毀犯佛戒不畏惡道無有慚耻以是因緣世世生處墮在胞胎受穢汙身不生淨土不得成佛從今受戒誓斷淫欲修清淨行以此淨業普與衆生莊嚴淨土誓求作佛弟子某甲自念此身於諸衆生多行諂誑欺罔於人妄語綺語惡口兩舌破滅佛法毀罵僧尼譏刺善人黨護不義見言不見不見言見覆障己非推求他過以是因緣千生萬劫受虗妄報遠離真實不生淨土不得成佛從今受戒誓斷妄語說如實語說如法語以此淨業普與衆生莊嚴淨土誓求作佛弟子某甲自念此身從無始來貪飲藥酒昏迷神性亂動諸根不辨尊卑不知善惡增長愚癡覆沒智慧以是因緣墮落生死受愚癡報不生淨土不得成佛從今受戒誓斷飲酒收攝諸根常修正念以此淨業普與衆生莊嚴淨土誓求作佛如是五種極重惡業當知即是生死根本衆苦之源障淨土門礙菩提路如是惡業未受已前充塞虗空遍周法界若不懺悔若不誓斷死生無路出離無門從今受戒誓斷五種極重惡業翻成五種清淨戒根若後再犯即是欺誑三寶諸天見生之中諸惡集身招不如意死入地獄受無量苦無解脫期若實不虗仰願三寶護法諸天常加護念令我罪根皆得消滅令我行願悉得滿足同聲念佛或懺違逆父母師長其文如後第六請師乞戒大小乘戒皆從師授受聲聞戒壇上十僧為師受菩薩戒諸佛菩薩為師或請彌陀為和尚觀音為羯磨勢至為教授近時道俗皆修淨業彌陀緣熟故多請之況法身體一三世道同隨機之教義無不可人多惑耳不免從衆依行法經次請五師或請六師則加普賢為懺悔主今以悔罪在前不復請也我某甲一心奉請釋迦牟尼佛為戒和尚我依我佛故得受菩薩戒慈愍故三請或一請觀時延促下同我某甲一心奉請文殊菩薩為羯磨阿闍梨我依菩薩故得受菩薩戒慈愍故我某甲一心奉請彌勒菩薩為教授阿闍梨我依菩薩故得受菩薩戒慈愍故我某甲一心奉請十方諸佛為尊證阿闍梨我依諸佛故得受菩薩戒慈愍故我某甲一心奉請十方諸大菩薩為同學法侶我依諸菩薩故得受菩薩戒慈愍故惟願釋迦本師十方諸佛諸大菩薩他心道眼無礙見聞鑒我䖍誠受我奉請不違本誓憐念衆生慈悲攝受方便拔濟盡未來時為作依怙既請師已即須從師乞戒乞云仰白十方盡虗空遍法界一切諸佛大地菩薩僧此大宋國某州某處佛菩薩像前諸佛子等今從諸佛菩薩乞受一切菩薩淨戒是諸佛子已是真實能生深信發菩提心行菩薩道惟願諸佛菩薩布施諸佛子等三聚淨戒三乞諸佛子三聚戒者聚以包攝為義一切戒法三種攝盡一者攝律儀聚律儀禁惡無惡不斷所謂殺盜淫妄等乃至煩惱無明永盡成法身佛名為斷德二者攝善法聚無善不修所謂發起智慧修習世出世間一切善法六度萬行不取不捨習行方便自利利他成報身佛名為智德三者攝衆生聚無生不度所謂六道四生含靈抱識方便導引同歸佛道成應身佛名為恩德諸佛子當知三聚戒體即是三佛因種經云衆生受佛戒即入諸佛位此之謂也第七立誓問遮立誓要期是得戒本帶遮輒受障戒不生當須審問隨問而答先立十誓果能行者當須答能諸佛子汝從今身已去能常念佛親近善知識否答能汝從今身已去能捨離一切惡知識否答能汝從今身已去若見一切衆生苦惱能隨力救護否答能汝從今身已去能盡形壽隨力供養三寶否答能汝從今身已去能捨諸懈怠發起精進勤求佛道否答能汝從今身已去能孝養父母敬事師長否答能汝從今身已去於五塵境煩惱生時能制伏心否答能汝從今身已去能於無上菩提生信心否答能已立十誓次問七遮諸佛子受佛淨戒必須身器清淨梵網經云若具七遮即身不得戒無七遮者得受良由七種逆業能障淨戒故並名遮有即言有無即言無當如實答一汝非出佛身血否答無二汝非殺父否答無三汝非殺母否答無四非殺得戒和尚否答無五汝非殺得戒阿闍梨否答無六汝非破羯磨轉法輪僧否答無七汝非殺阿羅漢否答無諸佛子汝今身無遮難甚是淨器戒可得受衆聖同慶須臾之間入諸佛位第八秉法授戒諸本羯磨各出不同或有止用三歸受者今依藏中菩薩羯磨文乃玄弉三藏翻出凡羯磨法須準佛言不可妄自加減應先告云諸佛子將作羯磨授汝戒法此戒法者即是十方三世諸佛菩薩積劫熏修無量功德諸佛已證菩薩今修假彼羯磨聖法動彼法界無量功德注入身心永作菩提成佛種子此身有謝彼法不失將來生佛淨土蓮華中身以至成佛果上百福莊嚴威神妙用即是今日所受戒體汝當攝心承仰不得昏散汝佛子聽汝等今者欲於我所受諸菩薩一切學處受諸菩薩一切淨戒所謂攝律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具普於十方現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學現在一切菩薩今學告云汝能受否答能諸佛子此是第一羯磨今法界善法由心業力翻惡為善悉皆動轉次作第二羯磨已告言今法界善法聚集空中如雲如蓋次作第三羯磨已告言今法界善法從空中下從頂門注入身心充滿正報當知汝身即是無邊功德善法之聚當須護持勿令毀犯第九說相示誡諸佛子已為汝授戒竟次當說相菩薩戒相有境皆是且依梵網經說十波羅夷其餘四十八輕垢八萬威儀等當依師學識達相貌則無毀犯第一不得殺下至有命者不得故殺凡為菩薩當起慈悲心方便救護而快意殺生得波羅夷罪汝能持否答能第二不得盜下至一針一草不得故盜凡為菩薩常助一切人生福生樂而反更盜人物得波羅夷罪汝能持否答能第三不得淫若男若女乃至非人畜生不得故淫凡為菩薩當救度衆生淨法與人而反更起一切人淫得波羅夷罪汝能持否答能第四不得妄語欺誑於人下至身心妄語凡為菩薩應常生正語而反生衆生邪語邪見業得波羅夷罪汝能持否答能第五不得酤酒一切酒不得酤凡為菩薩應生衆生明達之慧而反生衆生顛倒心得波羅夷罪汝能持否答能第六不得說在家出家人罪過凡為菩薩常生悲心教化一切人令生大乘善信而反更自說佛法中罪過得波羅夷罪汝能持否答能第七不得口自讚毀他凡為菩薩應代一切人受加毀辱惡事自向己好事與他人若自揚己德隱他人好事令他受毀得波羅夷罪汝能持否答能第八不得慳財慳法凡為菩薩見一切貧窮人來乞當須給與有求法者當為說法若不爾者得波羅夷罪汝能持否答能第九不得起嗔心凡為菩薩應生一切衆生善根無諍之事而反生嗔恨惡口罵辱手打刀杖得波羅夷罪汝能持否答能第十不得謗三寶凡為菩薩見外道惡人謗佛音聲如三百矛刺心況口自謗得波羅夷罪汝能持否答能已說十波羅夷竟四十八輕中略說三戒第一不得飲酒而酒生過失無量若故自飲教人飲犯輕垢罪汝能持否答能第二不得食一切衆生肉食肉得無量罪若故食者犯輕垢罪汝能持否答能第三不得食五辛大蒜革葱韭葱蘭葱興渠一切食中不得食若故食者犯輕垢罪汝能持否答能自餘不復一一別問當尋戒本讀誦受持識相守護勿令有犯經云是十波羅提木叉於中不應一一犯如微塵許何況具足犯十戒若有犯者不得見身發菩提心乃至佛性常住妙果一切皆失墮三惡道中二劫三劫不聞父母三寶名字等故知受已當護如命如帶浮囊欲渡大海若有犯者當須懺悔今依梵網出懺悔法經云若犯十戒者在佛菩薩像前日日六時誦十重四十八輕戒苦到禮三世千佛得見好相便得罪滅若無好相雖懺無益若犯四十八輕者對首懺悔不同七遮言對首者二人相對口陳紛犯即得罪滅第十歎德發願諸佛子受菩薩戒者功德難量高於須彌深於巨海諸佛稱讚遍在諸經略說八種殊勝功德第一趣道勝受菩薩戒如大鵬鳥一舉翅能至十萬九千餘里菩薩趣道亦復如是法華經云乘此寶乘直至道場又華嚴經云以少方便疾至菩提是此謂也第二發心勝受菩薩戒直是發菩提心當念成佛因果同時如好堅樹才出地面已高羣木如頻伽鳥㲉裏出聲能勝餘音所以菩薩在凡夫無明內煩惱㲉中能發此心已超聲聞之極果第三福田勝假使供養滿閻浮提阿羅漢僧不如供養一大鵬鳥所以者何由此鳥先曾受菩薩戒故第四功德勝受菩薩戒喻如日光受聲聞戒猶如螢火第五滅罪勝受菩薩戒出家犯四重諸篇在家犯十惡五逆準行法經罪皆除滅縱墮惡道受苦輕微以戒力故一切所生之處皆得為王第六處胎勝受菩薩戒人處胎時常為天龍八部諸善神王之所守護不令侵損第七神通勝大乘菩薩能變大地為七寶變大海為酥酪能超百佛世界能日度百千衆生小乘羅漢祇具三明六通八解脫耳第八果報勝菩薩果報萬善周圓湛然常住終無遷滅念念趣入薩婆若海一一成就無上菩提小乘聲聞但破見思成無學果未為究竟即法華云但離虗妄名為解脫而實未得一切解脫汝等既得戒已當須常發大乘度生誓願行大乘六念應云我某甲今於佛菩薩前發四弘誓願煩惱無數誓願斷法門無量誓願學衆生無邊誓願度佛道無上誓願成願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂國我既往生彼國已現前成就此大願一切圓滿盡無餘利樂一切衆生界彼佛衆生會咸淨我時於勝蓮華生親覩如來無量光現前授我菩提記蒙彼如來授記已化身無數百俱胝智力廣大遍十方普利一切衆生界乃至虗空世界盡衆生及業煩惱盡如是一切無盡時我願究竟恆無盡念佛救世大慈父念法出離解脫門念僧諸有良福田念戒無上菩提本念施具足波羅蜜念天護法利羣生上來受戒所有功德祝獻護法諸天報答四恩三有利樂法界衆生懺滌罪根莊嚴淨報仰願諸天八部增長威神常來護持我此國土風祥雨順穀果豐成聖帝仁王慈臨無際羣臣官屬常守尊榮萬姓四民永安富樂佛法檀越父母師僧歷世冤親法界含識咸生正信發菩提心六度齊修二嚴等備伏願我等衆聖冥加常值大乘及善知識開我佛慧願行現前荷負流通三世佛法誘化一切然無盡燈普會衆生同歸祕藏授大乘菩薩戒儀大宋政和元年歲在辛卯安居中為衆僧録出懺違逆父母如為出家五衆受戒當用此文現前一衆諸比丘僧無量劫來皆是父母生育此身受大苦惱今生父母自小愛憐捨我出家令我學道脫離遮俗削髮毀容為佛弟子四事成現學法修行一生間曠皆是父母捨我之恩碎身粉骨云何可報而我等輩內無高志外逐世緣懶惰懈怠於佛法中不勤修習或因學法出外游方父母在堂闕於侍養懸懸憶念日夜憂煎或成疾病或致死亡不歸省覲或有亡過墮在惡趣受諸苦惱必望我等功德拔濟而我忘恩偷安自處不思救度當知即是五逆罪人天地不容多遭橫逆如是重罪不通懺悔今將父母骨肉之身受菩薩戒畢世堅持隨力修行救拔父母速脫輪回早生淨土盡未來時修菩提道直至成佛誓效如來先度二親誓效目連先救亡母從今已往等視衆生皆同父母不起憎愛無有親疏起孝順心起慈悲心常行敬順無有違逆諸佛會中常相值遇修菩提道同成正覺懺違逆師長現前一衆諸比丘僧少小出家長大入道莫不皆有受度和尚三師七證依止闍梨諸善知識慈悲攝誘善巧提擕罔極深恩碎身難報教法開解衣食供須軟語教詔苦言調伏生我慧命育我法身父母七生師僧纍劫究竟度脫直至菩提而我愚癡不思恩德反生輕慢多端誹毀傳經授法曾不遵依法語善言但多違逆忘恩背義竊法謗師當知即是五逆罪人故於現生多遭惡疾夭壽橫死沈溺苦海無有休息今始覺知深生慚耻不敢覆藏仰對三寶彌陀世尊發露罪根求哀懺悔從今改過盡未來時在在處處與師俱生諸佛會中互為主伴遍微塵剎教化衆生盡出輪回同生淨土懺身計依金光明經淨名經録出又復我等無始劫來背捨本性真實法身隨虗妄緣起虗妄念造虗妄業受虗妄苦妄認四大為自身相六塵緣影為自心相不知此身四大假合從本不實和合而有無明羅剎止住其中從昔已來受生死苦常棄是身都無所為亦常愛護處之屋宅隨時供給衣服飲食臥具醫藥令無所乏而不知恩反生怨害然復不免無常敗壞是身不堅無所利益可惡如賊猶若行廁我於今月當使此身作無上業於生死海作大橋梁若捨此身則捨無量𤻕疽瘭疾百千怖畏是身唯有大小便利是身不堅如水上沫是身不淨多諸蟲戶是身可惡筋纏血塗皮骨髓腦共相連持是故我今應當捨離以求寂滅無上涅槃永離憂患無常變異生死休息無諸塵纍無量禪定智慧功德具足成就微妙法身百福莊嚴諸佛所讚證成如是無上法身與諸衆生無量法樂又復思念是身無常速朽之法為苦為惱衆病所集身如聚沫不可撮摩身如芭蕉中無堅實是身如幻從顛倒起是身如夢為虗妄見是身如影從業緣生是身如響屬諸因緣身如浮雲須臾變滅是身如電念念不住是身如空離我我所是身無知如草木石是身無作風力所轉是身不淨穢惡充滿是身虗僞必歸磨滅當知有身猶如毒蛇亦如惡賊亦如空聚陰界諸入所共合成是可厭患當樂佛身當知佛身即是法身從於無量功德智慧之所出生從戒定慧解脫知見慈悲喜捨布施持戒忍辱柔和精進禪定解脫三昧諸波羅蜜之所出生從方便生從六通生從三明生從道品生從止觀生從於十力四無所畏十八不共諸功德生如是無量清淨法生如來之身欲得佛身斷衆生病當發無上菩提之心剃髮儀式次第十科其間䇿導教誡引用因緣當隨機利鈍開解為先至於臨事不必一定今且作一途出法一選處設座律令於露地香水灑之周匝七尺四角懸幡今時多在大殿或在別堂事無不可若在大殿二師之座當須相對或面向佛今多背像大乖尊敬世王為況其過可知若在法堂衆堂當須設像於中自餘花幡香燭嚴飾隨時衆僧床座隨處鋪設其行者應令洗浴內著淨衣頂𩯭留少髮二集僧作梵令淨人打鐘集僧坐訖二師燒香即登二座其出家者安置近處已令維那鳴一下槌聲德者作優波離梵梵聲絶便打槌一下同聲說偈云戒香定香解脫香光明雲臺遍法界供養十方無量佛見聞普熏證寂滅有至梵音義字即誦非也梵音本為止息喧亂故三白衆召入凡白衆之語直述其事今時四六偶對或祝贊皇風或褒揚王道有同伶倫俳說無異致令聽者都無所曉弊風久矣宜須革之良久闍梨云敬白大衆今有某寺院行者某甲當處即云當寺當院厭世出家歸心三寶昨因選試獲中科名進納應云克勤給侍悅可衆心今奉帝恩許容披剃將從和尚乞求剃髮若準律文必須單白羯磨和告衆僧或復循房語令知委然此行者出家日久衆所同聞羯磨之辭不煩宣秉直令教授座主引入道場與其披剃某甲謹白若準律中例須單白今時乍投出家或有作者故為出之當如上敘白至乞求剃髮已接云準律文因諸比丘輒度人故為俗譏訶由是佛制凡伽藍中有剃髮者必須單白和僧意令合界通委內無專輒外絶譏訶故當稟律科儀先作羯磨僧集否答云僧已集和合否答云和合未受具戒者出答云此衆無未受具戒者不來諸比丘說欲及清淨答云此無說欲及清淨者僧今和合何所作為答云剃髮和僧單白羯磨白云大德僧聽彼某甲牒行者名欲求某甲比丘剃髮牒和尚名若僧時到僧忍聽與某甲剃髮白如是問云作法成否答成作法既成請教授座主引入道場云云如上教授座主今時謂之引請人即從座起至衆前合掌揖僧竟即出衆去四入衆請師引請師前引行者後隨直至佛前教禮三寶已引至和尚前設禮已互跪引請者云夫以儒敦事父唯重於成身釋制依師務存於學道庶使四儀軌度藉此以琢磨五分三身因茲而成立理須竭誠事奉克志陳詞恐汝未能我今教汝請詞云大德一心念我某甲今請大德為和尚願大德為我作和尚我依大德故得剃髮出家慈愍故連唱三遍亦不須云再請殷勤三請等出自流俗和尚告云可為汝作剃髮和尚次又引至闍梨所如上作禮互跪訖引請者云夫以厭處凡流欣參寶位將欲剪除於俗態理宜警䇿於蒙心矧在中人必由名匠今為汝請某人為汝作剃髮阿闍梨而況此師誨人無倦接物有方故須專秉一心恭陳三請詞云大德一心念我某甲今請大德為剃髮阿闍梨願大德為我作剃髮阿闍梨我依大德故得剃髮出家慈愍故三請闍梨云汝既陳請我為汝作剃髮闍梨所有教示當須諦聽五辭親脫素闍梨云出家之人高超俗表為世福田君不得而臣父不得而子應受人天恭敬供養是故剃髮著袈裟已至於君父尚無設禮之義況餘人乎然父母生汝養育恩深國王度汝其恩亦大當往顯處拜辭國王大臣及父母生緣竟卻入道場為汝落髮言訖即起引請者引出階庭之下燒香互跪說辭親偈引請者教行者逐句隨聲唱之偈云流轉三界中恩愛不能脫棄恩入無為真實報恩者偈訖即起先望北拜國王亦不須呼萬歲次拜父母親眷律中但辭父母今時先拜國王義須依準拜已即除巾冠素服著僧裙褊衫再引入衆直至闍梨所互跪六策導禮佛闍梨即為說出家功德令生欣踊應云善男子諦聽六道之中人身難得人倫之中出家者難汝今生處人道值佛出家自非宿植所深何由至此當須建出家心立丈夫志誓勤學道以求解脫南山律師云真誠出家者怖四怨之多苦厭三界之無常辭六親之至愛捨五欲之深著故知一切衆生繫屬於四怨戀著於三界情纏於六親心耽於五欲由是流轉生死經百千劫捨身受身無由解脫汝當捨諸虗妄回向真實持戒修定習慧行六度萬行學無量法門於末世中建立法幢續佛壽命令三寶不斷使衆生獲益若能如是是名真出家可以為六道福田作三乘因種堪受信施不負四恩是以佛言若人以四事供養四天下滿中羅漢盡於百年不如有人一日一夜發心出家功德又云若人起七寶塔高三十三天亦不如出家功德最勝廣在大藏不復繁引既知己身如此尊勝彌生珍敬勿得自轉如是隨機勸誘臨時自述不必誦語即取香湯為彼灌頂以指滴少許於頂上說偈贊云善哉大丈夫能了世無常捨俗趣泥洹希有難思議此偈闍梨直聲自說有令引請者說或行者隨和皆非偈訖告云汝當往佛前禮拜十方佛說歸依偈行者即起引至佛前教云歸依大世尊能受三有苦亦願諸衆生普入無為樂亦逐句隨聲說七落髮披衣引請者復引至闍梨所近前互跪以淨巾圍肩頃闍梨語云剃除鬚髮為捨憍慢著壞色衣為除貪愛少選之間即與三乘賢儀相無別當自欣慶即為剃四邊髮留頂上少許正剃髮時引請人即誦出家唄云毀形守志節割愛無所親棄家弘聖道願度一切人有令合衆同誦亦得又引至和尚所如前互跪和尚云今為汝去頂髮行者答云爾便為剃之或再誦出家唄亦得剃已除去淨巾和尚取袈裟授與行者便頂戴受已復還和尚如是三反已和尚親為著之說偈云大哉解脫服無相福田衣披奉如戒行廣度諸衆生此偈和尚自說不須隨和八授歸教誡律鈔至披袈裟已即令說偈禮散今多為授翻邪三皈隨為出之復至闍梨所告云準毗尼母論剃髮著袈裟已然後受三歸五戒十戒各登壇時當自受之今且為受翻邪三歸翻無始邪心歸三寶正覺應示三寶境界創入道門未諳法義且示住持三寶令寄心有所應云雕塑靈儀是佛寶琅函玉軸是法寶剃染稟戒為僧寶汝當志誠歸向從今已後盡此形命誓依佛為師誓學法藏誓同僧海如是種種隨機開導已云我某甲盡形壽歸依佛歸依法歸依僧三說已又加三結云我某甲盡形壽歸依佛已歸依法已歸依僧已授三歸已告云汝既出家當依出家法修出家行不得懶惰懈怠悠悠度日從今已後先須遠離諸惡且說六種言六種者一淫二盜三殺四妄五飲酒六食肉是六種惡障道之源輪回之本深須遠離慎勿為之當須咨白本師置辦三衣一鉢用擬受戒此衣鉢者乃是三世諸佛正儀賢聖沙門標志九十六種外道尚不知名字唯佛出世示此未曾有法若不自辦或臨時假借準律明判定不得戒由無戒故一生虗受信施將來墮墜惡道長劫輪回無由解脫此非小事宜切用心又須預擇明師咨問受戒方便儀式策發開導令心明了濁世凡夫善根微弱恐臨受戒魔障忽生從今已去即須除去雜務日夜誦持志誠祈禱乞聖加被及至受戒之後或依師學律或復聽經或參尋知識或誦經課佛或營事作福荷護佛法利益羣生不應作惡無懈求名逐利濫汙僧倫覆滅正法翻種苦業轉增生死是則出家無所利益常記此語以自䇿勤無為空死後致有悔云云九自慶禮謝復引至佛前三禮互跪教說自慶偈云遇哉值佛者何人誰不喜福願與時會我今獲法利逐句隨說說已復禮大衆及二師已令有衆僧下坐受六親拜賀悅其道意或恐事繁且待衆散拜賀亦得十祝贊回向律無此科今時所行或和尚或闍梨或引請人或有寺院常用表白皆得應執手爐上香維那打一下槌已云上來行法所有功德奉祝梵釋四王天龍八部伽藍真宰土地靈聰各軫威神安神護法今上皇帝聖化無窮文武官僚長居祿位師僧父母善惡知識十方信施法界衆生承此善根俱登彼岸念釋迦牟尼佛號隨位打槌念誦訖作處世界唄已便散作賀等或誦尊常開請奉福上界天龍八部等文此出智者法華懺儀其可準用今時亦多念對偶文章全非回向祝贊之意今並改正莫同浮俗受戒方便沙門元照元豐三年為諸沙彌出薩婆多論云凡欲受戒先與說法引導開解令於一切境上起慈愍心便得增上戒故知必須智解明白方可進受今為六位次第明之第一明所受法體標心期受須識何法今欲受戒為受何戒戒作何相謂佛出世制立戒法禁防身口調伏心行戒有多種五戒十戒先須受之今此受者即大比丘具足戒也且約戒本則二百五十略說則八萬四千廣則無量無邊十方諸佛三乘賢聖並同修故名為聖法今者發心誓稟此法然須實壇頂上十師座前作法而受因緣和集心境相冥發生無作領納在心名為戒體得此法已終身持奉如護明珠號良福田是真僧寶紹隆佛種興建法幢故知受時彌須用意一生大事不可自輕第二明受者具緣已知戒法受必藉緣一是人道諸天修羅地獄餓鬼畜生不受得故二須諸根具足顛狂啞聾身相不具亦不得受三須身器清淨曾破佛戒造重惡業亦不得受四出家相具須剃髮著袈裟若著外道俗服不名受具五得少分法謂須先受沙彌十戒又早辦三衣一鉢不得假借年歲滿足先請三師七證然後從僧乞戒一緣有缺法則不成第三明發戒境量諸緣雖具須明境遍緣境雖多不出有二一者情境即十方三世恆沙諸佛及諸菩薩緣覺聲聞諸天世人修羅地獄餓鬼畜生下至蚊虻𤼭蝨微細蠢動六趣之外中陰衆生如是等類皆遍十方並通三世無量無邊不可稱數皆發得戒二者非情境謂一切世間微塵國土山河大地草木花果乃至一花一葉一物一塵隨其數量亦皆發戒至於空有二諦滅理涅槃聖教經卷形像塔廟地水火風虗空識等要而言之總大千界依正二報無非戒境所以者何由未受前隨心造過惡遍法界今欲進受翻前惡境並起善心故戒發所因還遍法界所納戒體亦復無邊如是知之第四明依境發心律鈔明三品心中下二品得戒非勝今須直求上品故委示之既知境量當知發心作如是言我某甲自念無始時來迷失本性隨塵動念造衆惡業受生死苦沈流長劫無解脫期賴有宿緣生處人道值佛出家將受淨戒今者發心以立三誓我從今日盡此報形誓斷一切惡誓修一切善誓度一切衆生為欲成就三聚戒故為欲趣向三解脫門正為求大涅槃無上佛果又以此法引導衆生令至涅槃令法久住言略事廣下為略釋解云一切惡者殺盜淫妄貪嗔邪見身口動作一切非違乃至三界煩惱無明結使等一切善者世間人天凡福行及出世間三乘聖道佛果證行一切衆生者未成道果善趣惡趣總說萬斷諸有情衆三聚戒者菩薩法也一攝律儀戒二攝善法戒三攝衆生戒三解脫門者入道觀智也一空解脫門二無相解脫門三無作解脫門涅槃果者三身佛果也一法身二報身三應身引導衆生者利他行也上總列名下別配釋一者律儀禁惡由斷惡故即攝律儀戒又觀諸惡唯心所變性相平等無作無受則能趣向無作解脫門妄情既息真心體顯名法身佛成斷德也二者以修善故福智雙運即攝善法戒又觀諸善從衆緣生於中求實皆不可得則能趣向空解脫門了法無相歷劫勤行功德圓備名報身佛成智德也三者以度生故慈悲攝物即攝衆生戒又遍歷塵剎無數方便教化衆生而了知化相如幻如夢則能趣向無相解脫門隨緣赴感拔苦與樂如水中月任機大小名應身佛成恩德也上來三聚三脫三佛三德由前三誓而得成就故知三誓即三身因種然此三身即我心本無始迷覆妄動成業故受輪轉不了諸業元自我心隨緣流變今知虗妄回向真實故受淨戒誓志堅持即是求佛菩提發足之始此名上品勝心決定感發上品戒也故華嚴云戒為無上菩提本應當具足持淨戒又律偈云如是諸佛子勤求禁戒本終不面邪流沒溺生死海斯明證也第五明用心承仰心境相應納體正要未至壇上於佛像前如上發心及至登壇倍生欣慶不知宿何善本遇此勝緣心想于師同十方佛我今此身因他得度清淨戒法從他得受法身慧命假他得成正羯磨時冥心運想遍緣如上情非情境由境廣故心亦隨遍念念現前不得浮散當想己身總虗空界容受法界塵沙戒法當此之際深須用意莫緣他事差之毫微則徒染法流一生虗喪可不慎哉第六問重難輕遮律鈔云應沙彌時教令列名顯數識相誦之若不明識受戒不成第一汝不犯邊罪否答云無謂曾受佛戒已犯於四重即是佛海邊收之人從喻為名第二汝不白衣時汙淨戒比丘尼否答無第三汝不白衣沙彌時盜聽他說戒羯磨詐作比丘否答無謂白衣沙彌時盜聽大僧說戒羯磨法也第四汝非曾作外道來投受戒後還作外道今復來否答無謂先捨外道來受佛戒後復歸邪令重來受也第五汝非五種黃門否答無一天生二揵作即刀去陰根者三因見他淫妬心淫起四忽然變作五半月能淫半月不能淫第六汝非殺父否答無次至第十即五逆也第七汝非殺母否答無第八汝非殺阿羅漢否答無第九汝非破僧否答無謂立邪三寶破佛正法令僧異見不得道益第十汝非惡心出佛身血否答無上二難佛世則有末代所無第十一汝非天子阿修羅子名為非人變為人形而來受戒否答無第十二汝非諸龍畜等能變化者變為人形而來受戒否答無第十三汝今身中不帶佩男女二形否答無謂身挾二根僧尼不攝故上是十三難次問十六遮衣鉢父母各二并五病成十六今合為十汝今名誰稱己名云某甲和尚名誰稱壇上和尚兩字名云某甲年滿二十否答云已滿衣鉢具足否答云具足父母聽汝否父母存則答云聽父母亡則答云無父母汝不負債否答無準鈔縱有亦不遮受汝非他賤人佛不許度不是奴否答無汝非官人否答無汝是丈夫否答云是謂年二十能耐寒熱飢渴風雨毒蟲能忍惡言能一食持戒等是丈夫相丈夫有如是病一癩二癰疽三白癩四乾痟五顛狂汝無如此諸病否答無鈔云上四應得狂中若全不覺好惡不得近見新受戒人下壇已後多不誦戒既迷戒相遂多毀犯若準諸律五夏不誦盡形不離依止五百問云十夏不誦飲水食飯坐臥床席日日犯盜故知為僧不可不誦縱無音曲但須直誦縱不升座亦常受持佛言我不滅度半月一來又云若我在世無異此也願遵聖制無怠奉持建明州開元寺戒壇誓文釋迦遺法比丘元照恭於娑婆世界南瞻部州大宋國明州開元寺建築戒壇敬造護法神王立於壇上我聞神王有大弘誓於末法中護持塔像住持佛法利樂群生我今建此壇場直欲報答佛恩令戒律興隆三寶住世仰願同軫威神常來擁護若有毀戒作惡之人為求名利妄居師首秉實聖法誤彼來蒙即請驅逐令退勿使登壇或將腥酒觸汙此處即時誅罰令知畏敬將有水火風劫盜等難願同力捍護不令毀壞且使此壇在世久固令無量人登上受戒發大道心行菩提行展轉授受佛種不斷盡未來際興佛事紹聖五年二月十五日沙門元照謹誓鄭丞相跋佛人我一性也戒定慧一法也因法入性三無差別萬法錯陳戒為樞戶是故佛祖由此門入一切衆生能持戒心履戒行漸次成就不失本心不墮惡道由此精進定慧現前三明六通何遠之有鈍根劣想始勤終懈中道而盡與不戒同此末法之世所以大善知識以戒為大寶珠一切衆生以戒為菩薩道簡而易見要而易守不斷佛種入佛知見者其唯戒乎今觀照律師作大誓願建立戒壇其言深切其意勤懇示後學勸來世者至矣四明號為佛國而照公之真蹟具存可寶也已湖心龍律師得之以示余因書此紙以歸之嘉熙己亥季秋初吉安脫居士鄭清之誡沙彌辦衣鉢文戒從心發法假緣成律制沙彌須辦三衣一鉢資緣既備戒品方生問難之時須當審實羯磨詞內牒以告僧近世浮訛卛多慢易或從他借得或臨時稅來欺誑聖賢妄云己有且比試者極受難苦進納者稍廢資財及至受緣反同兒戲非唯慢律慢法實乃帶禍招殃律制作法不成定是一生無戒虗消信施濫在福田四事難消三途定入喪佛門入道之本虧國家祝度之恩在理既乖為過非小今遍行告示仰各知委宜準律科早須營辦
